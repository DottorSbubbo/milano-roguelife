let selectedStarterKey = null;


function showScreen(name) {
  document.querySelectorAll('.intro-screen').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById('screen-' + name);
  if (el) el.classList.remove('hidden');
  if (name === 'starter') buildStarterScreen();
}

function buildStarterScreen() {
  selectedStarterKey = null;
  document.getElementById('btn-conferma').disabled = true;
  const panel = document.getElementById('starter-info-panel');
  panel.classList.remove('visible');
  panel.innerHTML = '';

  const allKeys = Object.keys(ROT_DEFS);
  const picked = [];
  while (picked.length < 3) {
    const k = allKeys[Math.floor(Math.random() * allKeys.length)];
    if (!picked.includes(k)) picked.push(k);
  }

  const row = document.getElementById('starter-rots-row');
  row.innerHTML = '';
  for (const key of picked) {
    const def = ROT_DEFS[key];
    const tc  = TYPE_COLORS[def.type] || { bg:'#333', text:'#aaa' };
    const card = document.createElement('div');
    card.className = 'starter-card';
    card.dataset.key = key;
    card.innerHTML = `
      <div class="starter-sprite" style="background:${tc.bg}">
        <div class="starter-sprite-lbl" style="color:${tc.text}">${def.name}</div>
        <span class="starter-type-chip" style="background:rgba(0,0,0,0.5);color:${tc.text}">${def.type}</span>
      </div>
      <div class="starter-card-name">${def.name}</div>
    `;
    card.addEventListener('mouseenter', () => renderStarterInfo(key));
    card.addEventListener('click', () => {
      console.log('[starter-card] click su', key);
      document.querySelectorAll('.starter-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedStarterKey = key;
      document.getElementById('btn-conferma').disabled = false;
      renderStarterInfo(key);
    });
    row.appendChild(card);
  }
}

function renderStarterInfo(key) {
  const def  = ROT_DEFS[key];
  const tc   = TYPE_COLORS[def.type] || { bg:'#333', text:'#aaa' };
  const b    = def.base;
  const um   = def.uniqueMove;
  const umTc = um.type ? (TYPE_COLORS[um.type] || { bg:'#333', text:'#aaa' }) : { bg:'#303045', text:'#8888bb' };

  const umDesc =
    um.desc                 ? um.desc
  : um.effect === 'heal'    ? `Cura tutti gli alleati del ${Math.round((um.healPct||0)*100)}% degli HP massimi dell'utilizzatore.`
  : um.effect === 'cleanse' ? `Rimuove tutti gli status da tutti gli alleati in campo.${um.shieldPct ? ` Applica uno scudo pari al ${Math.round(um.shieldPct*100)}% degli HP massimi a tutto il team.` : ''}`
  : um.effect === 'stage'   ? 'Modifica le stat della squadra (ATK, SP.ATK, DEF, SP.DEF).'
  : um.status               ? `${um.status.chance * 100}% di probabilità di infliggere ${um.status.type === 'RANDOM' ? 'uno status casuale' : statusLink(um.status.type)} al bersaglio.${um.recoil ? ` Il lanciatore subisce un recoil pari al ${um.recoil}% del danno inflitto.` : ''}`
  : um.recoil               ? `Attacco potente. Il lanciatore subisce un recoil pari al ${um.recoil}% del danno inflitto.`
  : 'Nessun effetto secondario.';

  const catInfo = CATEGORY_INFO[um.cat];
  const powTxt = um.power > 0 ? `<span class="sip-pow">POTENZA ${um.power}</span>` : '';

  const panel = document.getElementById('starter-info-panel');
  panel.classList.add('visible');
  panel.innerHTML = `
    <div class="sip-header">
      <span class="sip-name" style="color:${tc.text}">${def.name}</span>
      <span class="sip-type-badge sip-chip-clickable" style="background:${tc.bg};color:${tc.text}">${def.type}</span>
    </div>

    <div class="sip-section-lbl">STAT BASE</div>
    <div class="sip-stats-grid">
      <div class="sip-stat-cell"><span class="sip-stat-lbl">HP</span><span class="sip-stat-num">${b.hp}</span></div>
      <div class="sip-stat-cell"><span class="sip-stat-lbl">ATK</span><span class="sip-stat-num">${b.atk}</span></div>
      <div class="sip-stat-cell"><span class="sip-stat-lbl">SP.ATK</span><span class="sip-stat-num">${b.spAtk}</span></div>
      <div class="sip-stat-cell"><span class="sip-stat-lbl">DEF</span><span class="sip-stat-num">${b.def}</span></div>
      <div class="sip-stat-cell"><span class="sip-stat-lbl">SP.DEF</span><span class="sip-stat-num">${b.spDef}</span></div>
      <div class="sip-stat-cell"><span class="sip-stat-lbl">SPD</span><span class="sip-stat-num">${b.spd}</span></div>
    </div>

    <div class="sip-move-section">
      <div class="sip-move-lbl">MOSSA UNICA</div>
      <div class="sip-move-box">
        <div class="sip-move-top">
          <span class="sip-move-name">${um.name}</span>
          ${powTxt}
          <div class="sip-chips">
            <span class="sip-chip sip-cat-icon sip-chip-clickable" title="${catInfo ? catInfo.label : um.cat}" onmouseenter="showCategoryInfo('${um.cat}')" onmouseleave="closeSecondaryInfo()">${catInfo ? catInfo.icon : um.cat}</span>
            <span class="sip-chip sip-chip-clickable" style="background:${umTc.bg};color:${umTc.text}" onmouseenter="showTypeInfo('${um.type || ''}')" onmouseleave="closeSecondaryInfo()">${um.type || 'NEUTRO'}</span>
          </div>
        </div>
        <div class="sip-move-desc">${umDesc}</div>
      </div>
    </div>
  `;

  const typeBadge = panel.querySelector('.sip-type-badge');
  if (typeBadge) {
    console.log('[renderStarterInfo] listener mouseover/mouseout registrato su sip-type-badge per tipo:', def.type);
    typeBadge.addEventListener('mouseover', () => {
      console.log('[sip-type-badge] mouseover -> showTypeInfo', def.type);
      showTypeInfo(def.type);
    });
    typeBadge.addEventListener('mouseout', () => {
      console.log('[sip-type-badge] mouseout -> closeSecondaryInfo');
      closeSecondaryInfo();
    });
  }
}

function confirmStarter() {
  console.log('[confirmStarter] conferma starter:', selectedStarterKey);
  if (!selectedStarterKey) return;
  const starterDef = ROT_DEFS[selectedStarterKey];
  const ov = document.getElementById('intro-overlay');
  ov.style.transition = 'opacity 0.45s';
  ov.style.opacity = '0';
  ov.style.pointerEvents = 'none';
  setTimeout(() => { ov.style.display = 'none'; startRun(starterDef); }, 460);
}

function startRun(starterDef) {
  const lvl = 1;
  runState = {
    level: lvl,
    gold: 0,
    enemyCount: 1,
    battlesWon: 0,
    roster: [
      mkRot(starterDef, lvl, true),
    ],
    marsupio: new Array(9).fill(null),
  };
  updateHud();
  startNextBattle();
}

function restartGame() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('progress-overlay').classList.remove('on');
  runState = null;
  const ov = document.getElementById('intro-overlay');
  ov.style.display = '';
  ov.style.opacity = '1';
  ov.style.pointerEvents = '';
  showScreen('title');
  playIntroMusic();
}

// ═══════════════════════════════════════════════════
// MUSICA
// ═══════════════════════════════════════════════════

const MUSIC_VOLUME = 0.5;
const MUSIC_FADE_MS = 1200;

const BATTLE_TRACKS = Array.from({ length: 12 }, (_, i) => `music/battle${i + 1}.mp3`);
const LOST_TRACKS = ['music/lost1.mp3', 'music/lost2.mp3'];

let musicMode = null; // 'intro' | 'battle' | 'lost'
let lastBattleTrack = null;

const musicA = new Audio();
const musicB = new Audio();
musicA.volume = 0;
musicB.volume = 0;
let activeMusic = musicA;
let inactiveMusic = musicB;

// Dissolvenza incrociata fluida tra il brano attivo e il nuovo brano
function crossfadeTo(src, { loop = false, onEnded = null } = {}) {
  const incoming = inactiveMusic;
  const outgoing = activeMusic;

  incoming.pause();
  incoming.src = src;
  incoming.loop = loop;
  try { incoming.currentTime = 0; } catch {}
  incoming.volume = 0;
  incoming.onended = onEnded;
  incoming.play().catch(() => {});

  const steps = 30;
  const stepTime = MUSIC_FADE_MS / steps;
  let i = 0;
  const startVol = outgoing.volume;
  const iv = setInterval(() => {
    i++;
    const t = i / steps;
    incoming.volume = Math.min(MUSIC_VOLUME, MUSIC_VOLUME * t);
    outgoing.volume = Math.max(0, startVol * (1 - t));
    if (i >= steps) {
      clearInterval(iv);
      outgoing.pause();
      outgoing.onended = null;
    }
  }, stepTime);

  activeMusic = incoming;
  inactiveMusic = outgoing;
}

function playIntroMusic() {
  if (musicMode === 'intro') return;
  musicMode = 'intro';
  crossfadeTo('music/intro.mp3', { loop: true });
}

function pickRandomBattleTrack() {
  let track;
  do {
    track = BATTLE_TRACKS[Math.floor(Math.random() * BATTLE_TRACKS.length)];
  } while (BATTLE_TRACKS.length > 1 && track === lastBattleTrack);
  lastBattleTrack = track;
  return track;
}

function playNextBattleTrack() {
  crossfadeTo(pickRandomBattleTrack(), { loop: false, onEnded: playNextBattleTrack });
}

// Avvia la playlist battle solo se non è già in corso (continua senza interruzioni tra negozio e battaglie)
function playBattleMusic() {
  if (musicMode === 'battle') return;
  musicMode = 'battle';
  playNextBattleTrack();
}

function playLostMusic() {
  musicMode = 'lost';
  const track = LOST_TRACKS[Math.floor(Math.random() * LOST_TRACKS.length)];
  crossfadeTo(track, { loop: false });
}

// L'autoplay senza interazione utente può essere bloccato dal browser:
// si tenta subito, e al primo click o movimento del mouse si (ri)avvia/riprende intro.mp3.
function startMusicWithAutoplayFallback() {
  playIntroMusic();

  const unlock = () => {
    playIntroMusic();
    activeMusic.play().catch(() => {});
    document.removeEventListener('click', unlock);
    document.removeEventListener('mousemove', unlock);
  };
  document.addEventListener('click', unlock);
  document.addEventListener('mousemove', unlock);
}

// ─── avvio ───
showScreen('title');

// Avvia subito la musica intro non appena il DOM è pronto, prima di qualsiasi interazione
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startMusicWithAutoplayFallback);
} else {
  startMusicWithAutoplayFallback();
}
</script>

<script>
// Animazione logo titolo: spritesheet 4000x5720, 5 colonne, frame 800x440 (13 righe = 65 frame).
// Gli ultimi 14 frame non fanno parte del loop (sfumano in una variante "PARMA"/celle vuote) → si usano solo i primi 51.
// Lo sfondo del PNG è verde chroma-key "cotto" nei pixel (non alpha) → si rende trasparente via codice
// dopo ogni drawImage, iterando i pixel con getImageData, una sola volta per frame (poi si riusano le copie elaborate).
(function () {
  const canvas = document.getElementById('title-canvas');
  const ctx = canvas.getContext('2d', { alpha: true });
  const FRAME_W = 800, FRAME_H = 440, COLS = 5;
  const TOTAL_FRAMES = 65, IGNORED_TRAILING_FRAMES = 14;
  const LOOP_FRAMES = TOTAL_FRAMES - IGNORED_TRAILING_FRAMES;
  const FPS = 12;
  const FRAME_DURATION = 1000 / FPS;
  const DISPLAY_W = 480; // dimensione del logo a schermo (CSS px)

  // La risoluzione interna del canvas viene impostata sulla dimensione visualizzata × devicePixelRatio,
  // così non avviene alcuna scalatura aggiuntiva da parte del compositor (che produrrebbe moiré sul testo pixel-art).
  const dpr = window.devicePixelRatio || 1;
  const displayH = Math.round(DISPLAY_W * FRAME_H / FRAME_W);
  canvas.style.width = DISPLAY_W + 'px';
  canvas.style.height = displayH + 'px';
  canvas.width = Math.round(DISPLAY_W * dpr);
  canvas.height = Math.round(displayH * dpr);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  const offscreen = document.createElement('canvas');
  offscreen.width = FRAME_W;
  offscreen.height = FRAME_H;
  const offCtx = offscreen.getContext('2d');

  function chromaKeyedFrame(col, row) {
    offCtx.clearRect(0, 0, FRAME_W, FRAME_H);
    offCtx.drawImage(img, col * FRAME_W, row * FRAME_H, FRAME_W, FRAME_H, 0, 0, FRAME_W, FRAME_H);
    const imageData = offCtx.getImageData(0, 0, FRAME_W, FRAME_H);
    const data = imageData.data;
    let keyedPixels = 0;
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i + 1], b = data[i + 2];
      if (g > r && g - b > 50) { data[i + 3] = 0; keyedPixels++; }
    }
    console.log(`[title-canvas] frame col=${col} row=${row}: ${keyedPixels} px resi trasparenti su ${data.length / 4}`);
    const out = document.createElement('canvas');
    out.width = FRAME_W;
    out.height = FRAME_H;
    out.getContext('2d').putImageData(imageData, 0, 0);
    return out;
  }

  const img = new Image();
  img.src = 'spritesheet/MILANO ROGUE LIFE.png';
  img.onerror = (e) => console.error('[title-canvas] errore caricamento spritesheet', e);
  img.onload = () => {
    console.log(`[title-canvas] spritesheet caricato: ${img.naturalWidth}x${img.naturalHeight}, costruisco ${LOOP_FRAMES} frame...`);
    const frames = [];
    for (let f = 0; f < LOOP_FRAMES; f++) {
      frames.push(chromaKeyedFrame(f % COLS, Math.floor(f / COLS)));
    }
    console.log(`[title-canvas] ${frames.length} frame pronti, canvas ${canvas.width}x${canvas.height} (CSS ${canvas.style.width} x ${canvas.style.height}), avvio animazione`);
    let frame = 0;
    let lastTime = 0;
    function tick(timestamp) {
      if (timestamp - lastTime >= FRAME_DURATION) {
        lastTime = timestamp;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(frames[frame], 0, 0, canvas.width, canvas.height);
        if (frame === 0) console.log('[title-canvas] disegnato frame 0 (loop completato)');
        frame = (frame + 1) % LOOP_FRAMES;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  };
})();
</script>
<script>
// Live reload: controlla Last-Modified ogni secondo e ricarica se il file è cambiato.
// Richiede un server HTTP (es. python3 -m http.server 8080) — non funziona con file://
(function () {
  if (location.protocol === 'file:') return;
  const url = location.href.split('?')[0];
  let lastMod = null;
  setInterval(async () => {
    try {
      const res = await fetch(url, { method: 'HEAD', cache: 'no-store' });
      const mod = res.headers.get('last-modified') || res.headers.get('etag');
      if (lastMod === null) { lastMod = mod; return; }
      if (mod && mod !== lastMod) location.reload();
    } catch {}
  }, 1000);
})();
</script>
