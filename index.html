// ── Icone freccia per buff/debuff attivi (stadi statistiche + POTERI FORTI), mostrate sopra la barra HP ──
function stageIconsHtml(rot) {
  const icons = [];
  for (const stat of ['atk','spAtk','def','spDef','spd']) {
    const stage = rot.stages[stat] || 0;
    if (stage === 0) continue;
    const arrow = stage > 0 ? '▲' : '▼';
    icons.push(`<span class="stage-icon" style="color:${STAT_STAGE_COLORS[stat]}" data-stage-stat="${stat}">${arrow}${Math.abs(stage)}</span>`);
  }
  if (rot.critChanceOverride != null) {
    icons.push(`<span class="stage-icon" style="color:#fb923c" data-stage-special="POTERI_FORTI">▲</span>`);
  }
  if (rot.landlordareTurns > 0) {
    icons.push(`<span class="stage-icon" style="color:#f472b6" data-stage-special="LANDLORDARE">▲</span>`);
  }
  if (!icons.length) return '';
  return `<div class="stage-row">${icons.join('')}</div>`;
}
function showStageInfo(rot, stat) {
  const stage = Math.max(-8, Math.min(8, rot.stages[stat] || 0));
  const mult = STAGE_MULT[stage];
  const kind = stage > 0 ? 'BUFF' : 'DEBUFF';
  const sign = stage > 0 ? '+' : '';
  openSecondaryInfoBattle(`
    <div class="info-title" style="color:${STAT_STAGE_COLORS[stat]}">${kind}: ${STAGE_STAT_LABELS[stat]}</div>
    <div class="info-text">${rot.def.name}: stadio ${sign}${stage} (moltiplicatore x${mult}).</div>
  `);
}
function showCritBoostInfo(rot) {
  openSecondaryInfoBattle(`
    <div class="info-title" style="color:#fb923c">POTERI FORTI</div>
    <div class="info-text">${rot.def.name}: 75% di probabilità di colpo critico per tutta la battaglia.</div>
  `);
}
function showLandlordareInfo(rot) {
  openSecondaryInfoBattle(`
    <div class="info-title" style="color:#f472b6">LANDLORDARE</div>
    <div class="info-text">Per 5 turni il team recupera il 10% degli HP massimi a fine turno. Turni rimanenti: ${rot.landlordareTurns}.</div>
  `);
}

// ── sprite ROT da spritesheet: carica l'immagine, applica chroma key verde
//    (rende trasparenti i pixel R<80, G>150, B<80, solo se spriteCfg.chromaKey !== false)
//    e mette in cache il risultato ──
const ROT_SPRITE_CACHE = {};
function loadRotSprite(spriteCfg) {
  let entry = ROT_SPRITE_CACHE[spriteCfg.src];
  if (entry) return entry;
  entry = { canvas: null, ready: false };
  ROT_SPRITE_CACHE[spriteCfg.src] = entry;
  const img = new Image();
  img.onload = () => {
    const off = document.createElement('canvas');
    off.width = img.width;
    off.height = img.height;
    const ctx = off.getContext('2d');
    ctx.drawImage(img, 0, 0);
    if (spriteCfg.chromaKey !== false) {
      const imgData = ctx.getImageData(0, 0, off.width, off.height);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        if (d[i] < 80 && d[i + 1] > 150 && d[i + 2] < 80) {
          d[i + 3] = 0;
        }
      }
      ctx.putImageData(imgData, 0, 0);
    }
    entry.canvas = off;
    entry.ready = true;
  };
  img.src = spriteCfg.src;
  return entry;
}

// avvia il loop di animazione del canvas: pesca il frame corrente dalla
// spritesheet (con chroma key applicato) e lo disegna finché il canvas è nel DOM
function initRotSpriteCanvas(canvas, spriteCfg) {
  const entry = loadRotSprite(spriteCfg);
  const ctx = canvas.getContext('2d');
  function draw() {
    if (!canvas.isConnected) return;
    if (entry.ready) {
      const frameIdx = Math.floor(Date.now() / (1000 / spriteCfg.fps)) % spriteCfg.frames;
      const col = frameIdx % spriteCfg.cols;
      const row = Math.floor(frameIdx / spriteCfg.cols);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(
        entry.canvas,
        col * spriteCfg.frameW, row * spriteCfg.frameH, spriteCfg.frameW, spriteCfg.frameH,
        0, 0, canvas.width, canvas.height
      );
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

// Calcola la dimensione del font del token nome in base alla lunghezza del nome,
// così il testo riempie sempre lo spazio fisso del token senza uscirne.
function nameTokenFontSize(name, scale = 1) {
  const len = name.length;
  const base = len <= 6  ? 14
              : len <= 9  ? 12
              : len <= 13 ? 10
              : len <= 17 ? 8
              : 7;
  return Math.round(base * scale * 10) / 10;
}

function renderGroup(id, rots, isPlayer) {
  const container = document.getElementById(id);
  container.innerHTML = '';
  for (const rot of rots) container.appendChild(mkCard(rot, isPlayer));
}

function mkCard(rot, isPlayer) {
  const tc = TYPE_COLORS[rot.def.type] || { bg:'#1a1a2a', text:'#aaa' };
  const pct = rot.curHp / rot.maxHp;
  const hpCls = pct > 0.5 ? 'high' : pct > 0.25 ? 'mid' : 'low';

  const inPlanning  = B.phase !== 'EXEC' && B.phase !== 'END';
  const isSelected  = inPlanning && isPlayer && B.current?.uid === rot.uid;
  const isAssigned  = inPlanning && isPlayer && !!B.assigned?.[rot.uid];
  const assignedAct = inPlanning && isPlayer ? B.assigned?.[rot.uid] : null;

  // Cliccabilità
  const isClickableForSelect = inPlanning && isPlayer && B.phase === 'ROT_SELECT' && rot.isAlive && !isAssigned;
  const targetable = inPlanning && B.phase === 'TARGET_SELECT' && rot.isAlive
    && (B.selMove?.target === 'ALLY' ? isPlayer : !isPlayer);

  // Effectiveness badge durante targeting
  let effHtml = '';
  if (targetable && B.selMove?.type) {
    const m = typeMult(B.selMove.type, rot.def.type);
    if (m === 2)   effHtml = '<div class="eff-badge super">2×</div>';
    if (m === 0.5) effHtml = '<div class="eff-badge resist">x0.5</div>';
  }

  const sbHtml = rot.statuses.map(s => {
    const lbl = s.type === 'AVVELENATO'    ? 'V'
              : s.type === 'BRUCIATO'      ? `B${s.stacks}`
              : s.type === 'FERITE'        ? `F${s.stacks}`
              : s.type === 'STRAFATTO'     ? `ST`
              : s.type === 'BURNOUT'       ? `BU${s.turns||''}`
              : s.type === 'COLLASSO'      ? `ZZ`
              : s.type === 'TASCHE BUCATE' ? `TB`
              : '?';
    const sel = activeBadge?.uid === rot.uid && activeBadge?.type === s.type ? ' selected' : '';
    const cls = s.type.replace(/\s+/g, '-');
    return `<span class="sbadge ${cls}${sel}" data-type="${s.type}" title="${s.type}">${lbl}</span>`;
  }).join('');

  const div = document.createElement('div');
  div.dataset.uid = rot.uid;
  div.className = [
    'rot-card',
    isPlayer ? 'player-card' : 'enemy-card',
    !rot.isAlive         ? 'dead'           : '',
    targetable           ? 'targetable'     : '',
    isSelected           ? 'rot-selected'   : '',
    isAssigned           ? 'rot-assigned'   : '',
    isClickableForSelect ? 'rot-clickable'  : '',
  ].filter(Boolean).join(' ');

  // Label assegnazione (sopra nome)
  const assignLbl = isAssigned
    ? `<div class="rot-assigned-lbl">✓ ${assignedAct.move.name}</div>`
    : `<div class="rot-assigned-lbl"></div>`;

  const stageHtml = stageIconsHtml(rot);

  div.innerHTML = `
    ${assignLbl}
    ${stageHtml}
    <div class="bars-frame">
      <span class="bars-bolt tl"></span>
      <span class="bars-bolt tr"></span>
      <span class="bars-bolt bl"></span>
      <span class="bars-bolt br"></span>
      <div class="bars-row">
        <div class="hp-bar-track">
          <div class="shield-fill" style="width:${rot.shield > 0 ? Math.min(100, (rot.shield/rot.maxHp)*100).toFixed(1) : 0}%"></div>
        </div>
        <div class="hp-nums">${rot.shield > 0 ? rot.shield : ''}</div>
      </div>
      <div class="bars-divider"></div>
      <div class="bars-row">
        <div class="hp-bar-track">
          <div class="hp-fill ${hpCls}" style="width:${Math.max(0, pct*100).toFixed(1)}%"></div>
        </div>
        <div class="hp-nums">${rot.curHp}</div>
      </div>
    </div>
    <div class="rot-name-wrap">
      <div class="rot-name-flames">
        <span class="flame-px"></span><span class="flame-px"></span><span class="flame-px"></span><span class="flame-px"></span><span class="flame-px"></span>
      </div>
      <div class="rot-name-token" style="font-size:${nameTokenFontSize(rot.def.name)}px; --token-bg:${NAME_TOKEN_COLORS[rot.def.type] || '#2a2a40'}">${rot.def.name}</div>
    </div>
    <div class="rot-sprite ${rot.def.sprite ? 'sprite-mode' : ''}" id="spr-${rot.uid}" style="${rot.def.sprite ? '' : `background:${tc.bg}`}">
      ${rot.def.sprite ? `<canvas class="rot-sprite-canvas${rot.def.sprite.mirrorWhen === (isPlayer ? 'player' : 'enemy') ? ' mirrored' : ''}" width="280" height="310"></canvas>` : ''}
      ${effHtml}
      <span class="type-chip" style="background:rgba(0,0,0,0.5);color:${tc.text}">${rot.def.type}</span>
      <div class="status-badges">${sbHtml}</div>
    </div>
  `;

  if (rot.def.sprite) {
    initRotSpriteCanvas(div.querySelector('.rot-sprite-canvas'), rot.def.sprite);
  }

  if (targetable) {
    div.querySelector('.rot-sprite').addEventListener('click', () => onTargetClick(rot));
  } else if (isClickableForSelect) {
    div.addEventListener('click', () => onPlayerRotClick(rot));
  }

  div.querySelectorAll('.sbadge').forEach(badge => {
    badge.addEventListener('click', e => {
      e.stopPropagation();
      activeBadge = { uid: rot.uid, type: badge.dataset.type };
      showStatusInfo(badge.dataset.type);
    });
  });

  div.querySelectorAll('.stage-icon').forEach(icon => {
    icon.addEventListener('mouseenter', e => {
      e.stopPropagation();
      if (icon.dataset.stageSpecial === 'LANDLORDARE') showLandlordareInfo(rot);
      else if (icon.dataset.stageSpecial) showCritBoostInfo(rot);
      else showStageInfo(rot, icon.dataset.stageStat);
    });
    icon.addEventListener('mouseleave', () => closeSecondaryInfoBattle());
  });

  div.addEventListener('mouseenter', () => showRotBattleInfo(rot));

  return div;
}

function renderPanel() {
  const left   = document.getElementById('panel-left');
  const center = document.getElementById('panel-center');
  const right  = document.getElementById('panel-right');

  left.innerHTML   = '';
  center.innerHTML = '';
  right.innerHTML  = '';

  // ── LEFT: testo di fase ──
  const phaseMap = {
    ROT_SELECT:    { lbl: 'SCEGLI ROT',       sub: 'clicca su un alleato' },
    MOVE_SELECT:   { lbl: 'SCEGLI MOSSA',     sub: B.current?.def.name || '' },
    TARGET_SELECT: { lbl: 'SCEGLI BERSAGLIO', sub: B.selMove?.name || '' },
    READY:         { lbl: 'PRONTO',           sub: 'tutti assegnati' },
    EXEC:          { lbl: 'ESECUZIONE',        sub: '' },
    END:           { lbl: '',                  sub: '' },
  };
  const ph = phaseMap[B.phase] || { lbl: '', sub: '' };
  left.innerHTML = `
    <div id="panel-left-phase">
      <div id="phase-lbl">${ph.lbl}</div>
      ${ph.sub ? `<div id="phase-sub">${ph.sub}</div>` : ''}
    </div>
    <div id="panel-left-wot">
      <button id="battle-log-btn" onclick="toggleBattleLogOverlay()">WOT?</button>
    </div>
  `;

  // ── CENTER: bottoni mossa (solo in MOVE_SELECT) ──
  if (B.phase === 'MOVE_SELECT' && B.current) {
    for (const move of B.current.moves) {
      const tc       = move.type ? (TYPE_COLORS[move.type] || { bg:'#333' }) : { bg:'#9ca3af' };
      const ppTxt    = move.curPp === Infinity ? '∞' : `${move.curPp}/${move.pp}`;
      const depleted = move.curPp !== Infinity && move.curPp <= 0;
      const btn = document.createElement('button');
      btn.className = 'move-btn';
      btn.disabled  = depleted;
      btn.innerHTML = `
        <span class="move-btn-name">${move.name}</span>
        <span class="move-btn-sub" style="color:${tc.bg}">${move.type || 'NEUTRO'} · ${move.cat} · PP ${ppTxt}</span>
      `;
      btn.addEventListener('mouseenter', () => showMoveInfo(move));
      btn.addEventListener('click', () => onMoveClick(move));
      center.appendChild(btn);
    }
  }

  // ── RIGHT: INDIETRO + AVVIA TURNO ──
  if (canGoBack()) {
    const backBtn = document.createElement('button');
    backBtn.id = 'back-btn';
    backBtn.textContent = '← INDIETRO';
    backBtn.addEventListener('click', goBack);
    right.appendChild(backBtn);
  }

  if (B.phase === 'READY') {
    const execBtn = document.createElement('button');
    execBtn.id = 'execute-btn';
    execBtn.textContent = 'AVVIA TURNO ▶';
    execBtn.addEventListener('click', executePhase);
    right.appendChild(execBtn);
  }
}

function log(txt, cls='') {
  const el = document.getElementById('battle-log');
  const d = document.createElement('div');
  d.className = 'lg ' + cls;
  d.textContent = '> ' + txt;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function logRich(parts, cls='') {
  const el = document.getElementById('battle-log');
  const d = document.createElement('div');
  d.className = 'lg ' + cls;
  d.appendChild(document.createTextNode('> '));
  for (const p of parts) {
    if (p.onclick) {
      const span = document.createElement('span');
      span.className = 'log-link';
      const fnStr = p.onclick.toString();
      if (fnStr.includes('showRotInfo')) span.classList.add('log-link-rot');
      else if (fnStr.includes('showMoveInfo')) span.classList.add('log-link-move');
      span.textContent = p.text;
      if (STATUS_NAMES_FOR_LINK.includes(p.text)) {
        span.addEventListener('mouseenter', () => openBattleLogSecondary(statusInfoHtml(p.text)));
        span.addEventListener('mouseleave', () => closeBattleLogSecondary());
      } else if (Object.keys(TYPE_COLORS).includes(p.text)) {
        span.addEventListener('mouseenter', () => openBattleLogSecondary(typeTableHtml(p.text)));
        span.addEventListener('mouseleave', () => closeBattleLogSecondary());
      } else {
        span.addEventListener('click', e => { e.stopPropagation(); p.onclick(); });
      }
      d.appendChild(span);
    } else {
      d.appendChild(document.createTextNode(p.text));
    }
  }
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function clearLog() { document.getElementById('battle-log').innerHTML = ''; }

function battleInputBlocked() {
  return !!document.querySelector(
    '#overlay.on, #shop-overlay.on, #rot-manager-overlay.on, #rot-confirm-overlay.on, ' +
    '#shop-move-info-overlay.on, #marsupio-overlay.show, #progress-overlay.on, ' +
    '#intro-overlay.on, #battle-log-overlay.open'
  );
}

function getKbSelectables() {
  if (!B) return [];
  if (B.phase === 'ROT_SELECT') {
    return [...document.querySelectorAll('#player-group .rot-card.rot-clickable')];
  } else if (B.phase === 'MOVE_SELECT') {
    return [...document.querySelectorAll('#panel-center .move-btn:not(:disabled)')];
  } else if (B.phase === 'TARGET_SELECT') {
    return [...document.querySelectorAll('.rot-card.targetable')];
  } else if (B.phase === 'READY') {
    const btn = document.getElementById('execute-btn');
    return btn ? [btn] : [];
  }
  return [];
}

function updateKbFocus(items) {
  items.forEach((el, i) => el.classList.toggle('kb-focused', i === kbSelIndex));
}

function confirmKbSelection(el) {
  if (B.phase === 'TARGET_SELECT') {
    const sprite = el.querySelector('.rot-sprite');
    if (sprite) sprite.click();
  } else {
    el.click();
  }
}

document.addEventListener('keydown', e => {
  if (!B || B.phase === 'EXEC' || B.phase === 'END') return;
  if (e.code !== 'Space' && !e.code.startsWith('Arrow')) return;
  if (battleInputBlocked()) return;

  const items = getKbSelectables();
  if (!items.length) return;

  if (e.code === 'Space') {
    e.preventDefault();
    if (kbSelIndex === -1) {
      kbSelIndex = 0;
      updateKbFocus(items);
    } else {
      const el = items[kbSelIndex];
      kbSelIndex = -1;
      confirmKbSelection(el);
    }
  } else {
    e.preventDefault();
    if (kbSelIndex === -1) return;
    const dir = (e.code === 'ArrowRight' || e.code === 'ArrowDown') ? 1 : -1;
    kbSelIndex = (kbSelIndex + dir + items.length) % items.length;
    updateKbFocus(items);
  }
});

function getCardEl(uid) {
  return document.querySelector(`.rot-card[data-uid="${uid}"]`);
}

function playCardAnim(uid, cls, durationMs) {
  const el = getCardEl(uid);
  if (!el) return;
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), durationMs);
}

// Saltino in avanti verso il bersaglio: gli alleati (a destra) saltano verso sinistra, i nemici verso destra
function attackAnim(rot) {
  const el = getCardEl(rot.uid);
  if (!el) return;
  el.style.setProperty('--atk-dx', rot.isPlayer ? 1 : -1);
  playCardAnim(rot.uid, 'atk-hop', 420);
}

// Contraccolpo all'indietro per chi subisce danno, con leggero spostamento del ROT dietro
function hitRecoilAnim(tgt) {
  const dir = tgt.isPlayer ? -1 : 1; // spinto via dal centro del campo
  const el = getCardEl(tgt.uid);
  if (el) {
    el.style.setProperty('--hit-dx', dir);
    playCardAnim(tgt.uid, 'hit-recoil', 380);
  }
  const team = tgt.isPlayer ? B.player : B.enemy;
  const idx = team.indexOf(tgt);
  const behind = team[tgt.isPlayer ? idx + 1 : idx - 1];
  if (behind) {
    const bEl = getCardEl(behind.uid);
    if (bEl) {
      bEl.style.setProperty('--hit-dx', dir);
      playCardAnim(behind.uid, 'nudge-back', 380);
    }
  }
}

// Ordine sinistra→destra dei ROT sul campo (nemici poi alleati)
function fieldLeftToRight() {
  return [...B.enemy, ...B.player];
}

// Saltello verso l'alto per buff/cura/scudo, a cascata tipo ola se più ROT lo ricevono insieme
function buffHopAnim(targetRots) {
  const order = fieldLeftToRight();
  const sorted = [...targetRots].sort((a, b) => order.indexOf(a) - order.indexOf(b));
  sorted.forEach((t, i) => {
    setTimeout(() => playCardAnim(t.uid, 'buff-hop', 380), i * 90);
  });
}

// Calcola l'altezza massima necessaria per il box descrizione mossa tra tutti i ROT,
// così tutti i box hanno la stessa dimensione fissa indipendentemente dal testo.
function computeMaxMoveDescHeight() {
  const panel = document.getElementById('starter-info-panel');
  const prevHtml = panel.innerHTML;
  const wasVisible = panel.classList.contains('visible');
  panel.classList.add('visible');
  panel.style.visibility = 'hidden';
  panel.style.position = 'fixed';
  panel.style.left = '-9999px';

  let maxH = 0;
  for (const key of Object.keys(ROT_DEFS)) {
    const um = ROT_DEFS[key].uniqueMove;
    panel.innerHTML = `<div class="sip-move-section"><div class="sip-move-box"><div class="sip-move-desc" style="height:auto;font-size:19px">${uniqueMoveDescText(um)}</div></div></div>`;
    const el = panel.querySelector('.sip-move-desc');
    maxH = Math.max(maxH, el.scrollHeight);
  }

  panel.innerHTML = prevHtml;
  panel.style.visibility = '';
  panel.style.position = '';
  panel.style.left = '';
  if (!wasVisible) panel.classList.remove('visible');
  return maxH;
}

const BATTLE_BACKGROUNDS = ['bar', 'duomo', 'fu', 'gari', 'pirello', 'rogo', 'navigli'];

// Versione unica usata sia per il precaricamento che per l'applicazione degli sfondi,
// così l'immagine richiesta in battaglia corrisponde a quella già in cache
const BATTLE_BG_VERSION = Date.now();

let lastBattleBackground = null;

// Precarica tutti gli sfondi di battaglia non appena il DOM è pronto
function preloadBattleBackgrounds() {
  BATTLE_BACKGROUNDS.forEach(name => {
    const img = new Image();
    img.src = `background/back%20battle/${name}.png?v=${BATTLE_BG_VERSION}`;
  });
}

// Sceglie uno sfondo casuale diverso dal precedente
function pickBattleBackground() {
  let choices = BATTLE_BACKGROUNDS;
  if (lastBattleBackground && BATTLE_BACKGROUNDS.length > 1) {
    choices = BATTLE_BACKGROUNDS.filter(b => b !== lastBattleBackground);
  }
  const pick = choices[Math.floor(Math.random() * choices.length)];
  lastBattleBackground = pick;
  return pick;
}

// Sceglie e applica un nuovo sfondo casuale (diverso dal precedente) per la battaglia corrente
function applyBattleBackground() {
  const name = pickBattleBackground();
  const src = `background/back%20battle/${name}.png?v=${BATTLE_BG_VERSION}`;
  const stageBg = document.getElementById('stage-bg');
  if (stageBg) {
    stageBg.style.backgroundImage = `url('${src}')`;
    stageBg.style.backgroundPosition = 'center center';
  }
}

const MUSIC_VOLUME = 0.5;
const MUSIC_FADE_MS = 1200;

const BATTLE_TRACKS = Array.from({ length: 21 }, (_, i) => `music/battle${i + 1}.mp3`);
const LOST_TRACKS = ['music/lost1.mp3', 'music/lost2.mp3'];

let musicMode = null; // 'intro' | 'battle' | 'lost'
let lastBattleTrack = null;
let musicUnlocked = false;
let introStarted = false;

// Istanza unica e dedicata per intro.mp3, per evitare avvii multipli sovrapposti
const introAudio = new Audio('music/intro.mp3');
introAudio.loop = true;
introAudio.volume = MUSIC_VOLUME;

const musicB = new Audio();
musicB.volume = 0;
let activeMusic = introAudio;
let inactiveMusic = musicB;

// Dissolvenza incrociata fluida tra il brano attivo e il nuovo brano
function crossfadeTo(src, { loop = false, onEnded = null } = {}) {
  const incoming = inactiveMusic;
  const outgoing = activeMusic;

  incoming.pause();
  incoming.src = src;
  incoming.loop = loop;
  try { incoming.currentTime = 0; } catch {}
  incoming.volume = 0;
  incoming.onended = onEnded;
  incoming.play().catch(err => console.log('errore audio:', err));

  const steps = 30;
  const stepTime = MUSIC_FADE_MS / steps;
  let i = 0;
  const startVol = outgoing.volume;
  const iv = setInterval(() => {
    i++;
    const t = i / steps;
    incoming.volume = Math.min(MUSIC_VOLUME, MUSIC_VOLUME * t);
    outgoing.volume = Math.max(0, startVol * (1 - t));
    if (i >= steps) {
      clearInterval(iv);
      outgoing.pause();
      outgoing.onended = null;
    }
  }, stepTime);

  activeMusic = incoming;
  inactiveMusic = outgoing;
}

// Avvia (o riavvia) intro.mp3 da zero su un'unica istanza, senza sovrapposizioni
function startIntroAudio() {
  introAudio.pause();
  introAudio.currentTime = 0;
  introAudio.volume = MUSIC_VOLUME;
  introAudio.play().catch(err => console.log('errore audio:', err));
}

function playIntroMusic() {
  if (musicMode === 'intro') return;
  musicMode = 'intro';
  if (!introStarted) {
    introStarted = true;
    activeMusic = introAudio;
    startIntroAudio();
  } else {
    crossfadeTo('music/intro.mp3', { loop: true });
  }
}

function pickRandomBattleTrack() {
  let track;
  do {
    track = BATTLE_TRACKS[Math.floor(Math.random() * BATTLE_TRACKS.length)];
  } while (BATTLE_TRACKS.length > 1 && track === lastBattleTrack);
  lastBattleTrack = track;
  return track;
}

function playNextBattleTrack() {
  crossfadeTo(pickRandomBattleTrack(), { loop: false, onEnded: playNextBattleTrack });
}

// Avvia la playlist battle solo se non è già in corso (continua senza interruzioni tra negozio e battaglie)
function playBattleMusic() {
  if (musicMode === 'battle') return;
  musicMode = 'battle';
  playNextBattleTrack();
}

function playLostMusic() {
  musicMode = 'lost';
  const track = LOST_TRACKS[Math.floor(Math.random() * LOST_TRACKS.length)];
  crossfadeTo(track, { loop: false });
}

// L'autoplay senza interazione utente è bloccato dal browser finché non c'è un gesto
// dell'utente (click, tasto, tocco). Si tenta subito; se fallisce, al primo gesto valido
// si rilancia playIntroMusic() forzando un nuovo tentativo di play() dentro il gesto stesso.
function startMusicWithAutoplayFallback() {
  playIntroMusic();

  const unlock = () => {
    if (musicUnlocked) return;
    musicUnlocked = true;
    if (introAudio.paused) {
      startIntroAudio();
    }
    document.removeEventListener('click', unlock);
    document.removeEventListener('keydown', unlock);
    document.removeEventListener('touchend', unlock);
  };
  document.addEventListener('click', unlock);
  document.addEventListener('keydown', unlock);
  document.addEventListener('touchend', unlock);
}

// ── Sparkle animato sul layer di sfondo della barra delle mosse: scie arcobaleno velocissime ──
function initActionPanelSparkles() {
  const container = document.getElementById('action-panel-sparkles');
  if (!container) return;
  const PARTICLE_COUNT = 70;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'sparkle-particle';
    const width = 60 + Math.random() * 160;
    const height = 2 + Math.random() * 4;
    const top = Math.random() * 100;
    const hue = Math.floor(Math.random() * 360);
    const zoomDur = (0.5 + Math.random() * 1.2).toFixed(2) + 's';
    const zoomDelay = (-Math.random() * 1.7).toFixed(2) + 's';
    const hueDur = (1.5 + Math.random() * 2.5).toFixed(2) + 's';
    const hueDelay = (-Math.random() * 4).toFixed(2) + 's';
    p.style.width = width + 'px';
    p.style.height = height + 'px';
    p.style.top = top + '%';
    p.style.setProperty('--c', `hsl(${hue}, 100%, 60%)`);
    p.style.animationDuration = `${zoomDur}, ${hueDur}`;
    p.style.animationDelay = `${zoomDelay}, ${hueDelay}`;
    container.appendChild(p);
  }
}
initActionPanelSparkles();

// ── reazione al click sui topi della striscia di pietra: ognuno fa qualcosa di
//    eclatante (salto enorme, esplosione di stelle, urlo da gigante), poi torna alla routine ──
function reactMouse(el) {
  if (el.classList.contains('mouse-reacting')) return;
  el.classList.add('mouse-reacting');
  const standFrame = el.querySelector('.mouse-frame-stand');
  const onEnd = () => {
    el.classList.remove('mouse-reacting');
    standFrame.removeEventListener('animationend', onEnd);
  };
  standFrame.addEventListener('animationend', onEnd);

  if (el.classList.contains('pixel-mouse-b')) {
    setTimeout(() => spawnMouseStars(el), 0.28 * 1400);
  } else if (el.classList.contains('pixel-mouse-c')) {
    spawnMouseSpeechBubble(el, 'EEEK!');
  }
}

// stelline colorate dell'esplosione del topo B
function spawnMouseStars(el) {
  const container = el.parentElement;
  const elRect = el.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();
  const cx = elRect.left - containerRect.left + elRect.width / 2;
  const cy = elRect.top - containerRect.top + elRect.height / 2;
  const colors = ['#ffd166', '#ef476f', '#06d6a0', '#118ab2', '#f78c6b', '#a78bfa'];
  for (let i = 0; i < 8; i++) {
    const star = document.createElement('div');
    star.className = 'mouse-star-particle';
    const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.4;
    const dist = 26 + Math.random() * 16;
    star.style.setProperty('--c', colors[i % colors.length]);
    star.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
    star.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
    star.style.left = cx + 'px';
    star.style.top = cy + 'px';
    container.appendChild(star);
    setTimeout(() => star.remove(), 900);
  }
}

// nuvoletta di testo dell'urlo del topo C
function spawnMouseSpeechBubble(el, text) {
  const container = el.parentElement;
  const elRect = el.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();
  const cx = elRect.left - containerRect.left + elRect.width / 2;
  const cy = elRect.top - containerRect.top;
  const bubble = document.createElement('div');
  bubble.className = 'mouse-speech-bubble';
  bubble.textContent = text;
  bubble.style.left = cx + 'px';
  bubble.style.top = cy + 'px';
  container.appendChild(bubble);
  setTimeout(() => bubble.remove(), 1600);
}

// ── reazione al click sugli uccelli: ognuno fa qualcosa di eclatante
//    (loop-the-loop in panico, perde piume, diventa gigante e starnazza), poi torna alla routine ──
function reactBird(el) {
  if (el.classList.contains('bird-reacting')) return;
  el.classList.add('bird-reacting');
  const perchFrame = el.querySelector('.bird-frame-perch');
  const onEnd = () => {
    el.classList.remove('bird-reacting');
    perchFrame.removeEventListener('animationend', onEnd);
  };
  perchFrame.addEventListener('animationend', onEnd);

  if (el.classList.contains('pixel-bird-b')) {
    setTimeout(() => spawnBirdFeathers(el), 0.25 * 1300);
  } else if (el.classList.contains('pixel-bird-c')) {
    spawnMouseSpeechBubble(el, 'SQUAWK!');
  }
}

// piume colorate perse dall'uccello B durante la sua reazione
function spawnBirdFeathers(el) {
  const container = el.parentElement;
  const elRect = el.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();
  const cx = elRect.left - containerRect.left + elRect.width / 2;
  const cy = elRect.top - containerRect.top + elRect.height / 2;
  const colors = ['#e8d8c0', '#9a8a6a', '#6a5840', '#cdbfa8'];
  for (let i = 0; i < 6; i++) {
    const f = document.createElement('div');
    f.className = 'bird-feather-particle';
    const angle = (i / 6) * Math.PI * 2 + Math.random() * 0.5;
    const dist = 20 + Math.random() * 16;
    f.style.setProperty('--c', colors[i % colors.length]);
    f.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
    f.style.setProperty('--dy', `${Math.sin(angle) * dist - 10}px`);
    f.style.left = cx + 'px';
    f.style.top = cy + 'px';
    container.appendChild(f);
    setTimeout(() => f.remove(), 950);
  }
}

// ── reazione al click sugli aerei: ognuno fa qualcosa di eclatante
//    (barrel roll in fuga, in difficoltà con scia di fumo, giro della morte), poi torna alla rotta ──
function reactPlane(el) {
  if (el.classList.contains('plane-reacting')) return;
  el.classList.add('plane-reacting');
  const frame = el.querySelector('.plane-frame');
  const onEnd = () => {
    el.classList.remove('plane-reacting');
    frame.removeEventListener('animationend', onEnd);
  };
  frame.addEventListener('animationend', onEnd);

  if (el.classList.contains('pixel-plane-b')) {
    setTimeout(() => spawnPlaneSmoke(el), 0.20 * 1800);
  }
}

// scia di fumo grigio dell'aereo B durante la sua reazione
function spawnPlaneSmoke(el) {
  const container = el.parentElement;
  const elRect = el.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();
  const cx = elRect.left - containerRect.left + elRect.width / 2;
  const cy = elRect.top - containerRect.top + elRect.height / 2;
  const colors = ['#9a9aa8', '#6a6a78', '#c0c0cc', '#7e7e8c'];
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    s.className = 'plane-smoke-particle';
    const angle = Math.PI + (Math.random() - 0.5) * 1.2;
    const dist = 14 + Math.random() * 22;
    s.style.setProperty('--c', colors[i % colors.length]);
    s.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
    s.style.setProperty('--dy', `${Math.abs(Math.sin(angle) * dist) + i * 4}px`);
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    container.appendChild(s);
    setTimeout(() => s.remove(), 1150);
  }
}

// ── bombe sganciate occasionalmente dagli aerei: cadono con gravità e
//    esplodono al contatto con la striscia di granito ──
const PLANE_VISIBLE_WINDOW_MS = {
  'pixel-plane-a': 95000 * 0.18,
  'pixel-plane-b': 130000 * 0.22,
  'pixel-plane-c': 110000 * 0.16,
};

function maybeDropBomb(el) {
  if (Math.random() > 0.35) return;
  let windowMs = 17000;
  for (const cls in PLANE_VISIBLE_WINDOW_MS) {
    if (el.classList.contains(cls)) { windowMs = PLANE_VISIBLE_WINDOW_MS[cls]; break; }
  }
  setTimeout(() => dropBomb(el), windowMs * (0.3 + Math.random() * 0.4));
}

function dropBomb(el) {
  if (el.classList.contains('plane-reacting')) return;
  const stage = document.getElementById('stage');
  const elRect = el.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();
  if (elRect.right < stageRect.left || elRect.left > stageRect.right) return;

  const x = elRect.left - stageRect.left + elRect.width / 2;
  const startY = elRect.top - stageRect.top + elRect.height;
  const groundY = stageRect.height - 56;
  const dist = groundY - startY;
  if (dist <= 4) return;

  const bomb = document.createElement('div');
  bomb.className = 'pixel-bomb';
  bomb.style.left = x + 'px';
  bomb.style.top = startY + 'px';
  bomb.style.setProperty('--dist', dist + 'px');
  const duration = Math.max(0.5, Math.min(1.6, dist / 120));
  bomb.style.animationDuration = duration + 's';
  stage.appendChild(bomb);
  setTimeout(() => {
    bomb.remove();
    explodeBomb(stage, x, groundY);
  }, duration * 1000);
}

// esplosione pixel art colorata al contatto della bomba con il granito
function explodeBomb(stage, x, y) {
  const flash = document.createElement('div');
  flash.className = 'bomb-flash';
  flash.style.left = (x - 7) + 'px';
  flash.style.top = (y - 7) + 'px';
  stage.appendChild(flash);
  setTimeout(() => flash.remove(), 550);

  const colors = ['#ffd24a', '#ff8a3c', '#ff4d3c', '#ffffff', '#ffb347'];
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'bomb-explosion-particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 14 + Math.random() * 26;
    p.style.setProperty('--c', colors[i % colors.length]);
    p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
    p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    stage.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }
}

// ── cacca degli uccelli: occasionalmente in volo lasciano cadere una
//    gocciolina bianca che lascia una macchia sulla striscia di granito ──
const BIRD_FLY_WINDOW_MS = {
  'pixel-bird-a': 34000 * 0.24,
  'pixel-bird-b': 42000 * 0.24,
  'pixel-bird-c': 38000 * 0.24,
};

function maybeDropPoop(el) {
  if (Math.random() > 0.3) return;
  let windowMs = 8000;
  for (const cls in BIRD_FLY_WINDOW_MS) {
    if (el.classList.contains(cls)) { windowMs = BIRD_FLY_WINDOW_MS[cls]; break; }
  }
  setTimeout(() => dropPoop(el), windowMs * (0.2 + Math.random() * 0.6));
}

function dropPoop(el) {
  if (el.classList.contains('bird-reacting')) return;
  const stage = document.getElementById('stage');
  const elRect = el.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();
  if (elRect.right < stageRect.left || elRect.left > stageRect.right) return;

  const x = elRect.left - stageRect.left + elRect.width / 2;
  const startY = elRect.top - stageRect.top + elRect.height;
  const groundY = stageRect.height - 56;
  const dist = groundY - startY;
  if (dist <= 4) return;

  const drop = document.createElement('div');
  drop.className = 'pixel-poop-drop';
  drop.style.left = x + 'px';
  drop.style.top = startY + 'px';
  drop.style.setProperty('--dist', dist + 'px');
  const duration = Math.max(0.3, Math.min(1, dist / 180));
  drop.style.animationDuration = duration + 's';
  stage.appendChild(drop);
  setTimeout(() => {
    drop.remove();
    spawnPoopStain(stage, x, groundY);
  }, duration * 1000);
}

// macchia bianca lasciata dalla cacca sul granito, sparisce dopo qualche secondo
function spawnPoopStain(stage, x, y) {
  const stain = document.createElement('div');
  stain.className = 'poop-stain';
  stain.style.left = (x - 3) + 'px';
  stain.style.top = (y - 1) + 'px';
  stage.appendChild(stain);
  setTimeout(() => stain.remove(), 4000);
}

document.querySelectorAll('.pixel-plane').forEach(el => {
  el.addEventListener('animationiteration', () => maybeDropBomb(el));
});
document.querySelectorAll('.pixel-bird').forEach(el => {
  el.addEventListener('animationiteration', () => maybeDropPoop(el));
});

// ─── avvio ───
showScreen('title');

// Avvia subito la musica intro non appena il DOM è pronto, prima di qualsiasi interazione
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startMusicWithAutoplayFallback);
  document.addEventListener('DOMContentLoaded', preloadBattleBackgrounds);
} else {
  startMusicWithAutoplayFallback();
  preloadBattleBackgrounds();
}
</script>

<script>
// Animazione logo titolo: spritesheet 4000x5720, 5 colonne, frame 800x440 (13 righe = 65 frame).
// Gli ultimi 14 frame non fanno parte del loop (sfumano in una variante "PARMA"/celle vuote) → si usano solo i primi 51.
// Lo sfondo del PNG è verde chroma-key "cotto" nei pixel (non alpha) → si rende trasparente via codice
// dopo ogni drawImage, iterando i pixel con getImageData, una sola volta per frame (poi si riusano le copie elaborate).
(function () {
  const canvas = document.getElementById('title-canvas');
  const ctx = canvas.getContext('2d', { alpha: true });
  const FRAME_W = 800, FRAME_H = 440, COLS = 5;
  const TOTAL_FRAMES = 65, IGNORED_TRAILING_FRAMES = 14;
  const LOOP_FRAMES = TOTAL_FRAMES - IGNORED_TRAILING_FRAMES;
  const FPS = 12;
  const FRAME_DURATION = 1000 / FPS;
  const DISPLAY_W = 480; // dimensione del logo a schermo (CSS px)

  // La risoluzione interna del canvas viene impostata sulla dimensione visualizzata × devicePixelRatio,
  // così non avviene alcuna scalatura aggiuntiva da parte del compositor (che produrrebbe moiré sul testo pixel-art).
  const dpr = window.devicePixelRatio || 1;
  const displayH = Math.round(DISPLAY_W * FRAME_H / FRAME_W);
  canvas.style.width = DISPLAY_W + 'px';
  canvas.style.height = displayH + 'px';
  canvas.width = Math.round(DISPLAY_W * dpr);
  canvas.height = Math.round(displayH * dpr);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  const offscreen = document.createElement('canvas');
  offscreen.width = FRAME_W;
  offscreen.height = FRAME_H;
  const offCtx = offscreen.getContext('2d');

  function chromaKeyedFrame(col, row) {
    offCtx.clearRect(0, 0, FRAME_W, FRAME_H);
    offCtx.drawImage(img, col * FRAME_W, row * FRAME_H, FRAME_W, FRAME_H, 0, 0, FRAME_W, FRAME_H);
    const imageData = offCtx.getImageData(0, 0, FRAME_W, FRAME_H);
    const data = imageData.data;
    let keyedPixels = 0;
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i + 1], b = data[i + 2];
      if (g > r && g - b > 50) { data[i + 3] = 0; keyedPixels++; }
    }
    console.log(`[title-canvas] frame col=${col} row=${row}: ${keyedPixels} px resi trasparenti su ${data.length / 4}`);
    const out = document.createElement('canvas');
    out.width = FRAME_W;
    out.height = FRAME_H;
    out.getContext('2d').putImageData(imageData, 0, 0);
    return out;
  }

  const img = new Image();
  img.src = 'spritesheet/MILANO ROGUE LIFE.png';
  img.onerror = (e) => console.error('[title-canvas] errore caricamento spritesheet', e);
  img.onload = () => {
    console.log(`[title-canvas] spritesheet caricato: ${img.naturalWidth}x${img.naturalHeight}, costruisco ${LOOP_FRAMES} frame...`);
    const frames = [];
    for (let f = 0; f < LOOP_FRAMES; f++) {
      frames.push(chromaKeyedFrame(f % COLS, Math.floor(f / COLS)));
    }
    console.log(`[title-canvas] ${frames.length} frame pronti, canvas ${canvas.width}x${canvas.height} (CSS ${canvas.style.width} x ${canvas.style.height}), avvio animazione`);
    let frame = 0;
    let lastTime = 0;
    function tick(timestamp) {
      if (timestamp - lastTime >= FRAME_DURATION) {
        lastTime = timestamp;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(frames[frame], 0, 0, canvas.width, canvas.height);
        if (frame === 0) console.log('[title-canvas] disegnato frame 0 (loop completato)');
        frame = (frame + 1) % LOOP_FRAMES;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  };
})();
</script>
<script>
// Live reload: controlla Last-Modified ogni secondo e ricarica se il file è cambiato.
// Richiede un server HTTP (es. python3 -m http.server 8080) — non funziona con file://
(function () {
  if (location.protocol === 'file:') return;
  const url = location.href.split('?')[0];
  let lastMod = null;
  setInterval(async () => {
    try {
      const res = await fetch(url, { method: 'HEAD', cache: 'no-store' });
      const mod = res.headers.get('last-modified') || res.headers.get('etag');
      if (lastMod === null) { lastMod = mod; return; }
      if (mod && mod !== lastMod) location.reload();
    } catch {}
  }, 1000);
})();
</script>
