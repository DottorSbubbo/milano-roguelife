const STAT_STAGE_COLORS = { atk:'#ef4444', spAtk:'#a855f7', def:'#3b82f6', spDef:'#22c55e', spd:'#06b6d4' };

function effStat(rot, s) {
  const stage = Math.max(-8, Math.min(8, rot.stages[s] || 0));
  return Math.max(1, Math.floor(rot.stats[s] * STAGE_MULT[stage]));
}

// ZOCCOLI DI LEGNO: il ROT va sempre per ultimo (velocità effettiva = -∞ per il sort)
function spdForSort(rot) {
  if (rot.items.includes('ZOCCOLI_DI_LEGNO')) return -Infinity;
  return effStat(rot, 'spd');
}

function calcDmg(atk, def, move) {
  const lvl = atk.level;
  const pow = move.power;
  const a = move.cat === 'PHYSICAL' ? effStat(atk,'atk') : effStat(atk,'spAtk');
  const d = move.cat === 'PHYSICAL' ? effStat(def,'def') : effStat(def,'spDef');
  let dmg = (((2 * lvl / 5 + 2) * pow * a / d) / 50 + 2) * 3;
  // STAB: solo mosse tipizzate
  const stab = move.type !== null && move.type === atk.def.type;
  if (stab) dmg *= 1.5;
  // Type effectiveness: solo mosse tipizzate
  const tm = move.type !== null ? typeMult(move.type, def.def.type) : 1;
  dmg *= tm;
  // Critico: 10% base (+1% per critBonus stackabile), o probabilità fissa con POTERI FORTI. Moltiplicatore x1.5 dopo tutti gli altri
  const critChance = atk.critChanceOverride != null ? atk.critChanceOverride : (0.10 + (atk.critBonus || 0) * 0.01);
  const crit = Math.random() < critChance;
  if (crit) dmg *= 1.5;
  // FERITE: ogni stack del bersaglio aumenta il danno subito del 10%
  const ferite = def.statuses.find(s => s.type === 'FERITE');
  if (ferite) dmg *= (1 + ferite.stacks * 0.10);
  // Buff iniziale: +50% al turno 1, -1% per turno, 0% dal turno 50 in poi (solo giocatore)
  if (atk.isPlayer) dmg *= earlyTurnDamageBuff();
  // Buff difensivo iniziale: -25% danno subito al turno 1, -0.5% per turno, 0% dal turno 50 in poi (solo giocatore)
  if (def.isPlayer) dmg *= earlyTurnDefenseBuff();
  return { dmg: Math.max(1, Math.floor(dmg)), stab, tm, crit };
}

// +50% al turno 1, decresce di 1% ogni turno, nessun bonus dal turno 50 in poi
function earlyTurnDamageBuff() {
  if (turnNum >= 50) return 1;
  const bonusPct = 50 - (turnNum - 1);
  return 1 + bonusPct / 100;
}

// -25% danno subito al turno 1, decresce di 0.5% ogni turno, nessuna riduzione dal turno 50 in poi
function earlyTurnDefenseBuff() {
  if (turnNum >= 50) return 1;
  const reductionPct = Math.max(0, 25 - (turnNum - 1) * 0.5);
  return 1 - reductionPct / 100;
}

function takeDmg(rot, amount) {
  if (rot.shield > 0) {
    if (rot.shield >= amount) { rot.shield -= amount; return; }
    amount -= rot.shield;
    rot.shield = 0;
  }
  rot.curHp = Math.max(0, rot.curHp - amount);
  if (rot.curHp === 0) rot.isAlive = false;
}

// ── WELFARE GRATUITO: +50% efficacia di cure/scudi applicati dal o al possessore ──
function welfareMult(rot, source) {
  let mult = 1;
  if (rot.items.includes('WELFARE_GRATUITO')) mult *= 1.5;
  if (source && source !== rot && source.items.includes('WELFARE_GRATUITO')) mult *= 1.5;
  return mult;
}

// ── Applica una cura (con bonus WELFARE GRATUITO), replicandola su tutta la squadra se il ricevente ha COLBACCO ──
function applyHealAmount(rot, amount, source, skipReplicate) {
  if (!rot.isAlive) return 0;
  const finalAmt = Math.floor(amount * welfareMult(rot, source));
  const before = rot.curHp;
  rot.curHp = Math.min(rot.maxHp, rot.curHp + finalAmt);
  const healed = rot.curHp - before;
  if (!skipReplicate && finalAmt > 0 && rot.items.includes('COLBACCO')) {
    const team = rot.isPlayer ? B.player : B.enemy;
    for (const ally of team.filter(r => r.isAlive && r !== rot)) {
      applyHealAmount(ally, amount, source, true);
    }
  }
  return healed;
}
function applyHealPct(rot, pct, source, skipReplicate) {
  return applyHealAmount(rot, rot.maxHp * pct, source, skipReplicate);
}

// ── Applica uno scudo (con bonus WELFARE GRATUITO), replicandolo su tutta la squadra se il ricevente ha COLBACCO ──
function applyShieldAmount(rot, amount, source, skipReplicate) {
  if (!rot.isAlive) return 0;
  const finalAmt = Math.floor(amount * welfareMult(rot, source));
  rot.shield += finalAmt;
  if (!skipReplicate && finalAmt > 0 && rot.items.includes('COLBACCO')) {
    const team = rot.isPlayer ? B.player : B.enemy;
    for (const ally of team.filter(r => r.isAlive && r !== rot)) {
      applyShieldAmount(ally, amount, source, true);
    }
  }
  return finalAmt;
}
function applyShieldPct(rot, pct, source, skipReplicate) {
  return applyShieldAmount(rot, rot.maxHp * pct, source, skipReplicate);
}

function addStatus(rot, type) {
  const ex = rot.statuses.find(s => s.type === type);
  if (type === 'BRUCIATO') {
    if (ex) { if (ex.stacks < 3) { ex.stacks++; return true; } return false; }
    rot.statuses.push({ type, stacks: 1 }); return true;
  }
  if (type === 'AVVELENATO') {
    if (ex) return false;
    rot.statuses.push({ type, stacks: 1 }); return true;
  }
  if (type === 'FERITE') {
    if (ex) { if (ex.stacks < 5) { ex.stacks++; return true; } return false; }
    rot.statuses.push({ type, stacks: 1 }); return true;
  }
  if (type === 'STRAFATTO') {
    if (ex) return false;
    rot.statuses.push({ type, stacks: 1, turns: 3 }); return true;
  }
  if (type === 'BURNOUT') {
    if (ex) return false;
    rot.statuses.push({ type, stacks: 1, turns: 5 }); return true;
  }
  if (type === 'COLLASSO') {
    if (ex) return false;
    rot.statuses.push({ type, stacks: 1 }); return true;
  }
  if (type === 'TASCHE BUCATE') {
    if (ex) return false;
    rot.statuses.push({ type, stacks: 1 }); return true;
  }
  return false;
}

function endTurnStatuses(rot) {
  const logs = [];
  const toRemove = [];
  for (const st of rot.statuses) {
    if (st.type === 'AVVELENATO') {
      const d = Math.max(1, Math.floor(rot.maxHp * 0.10));
      takeDmg(rot, d);
      logs.push({ parts:[
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' è ' },
        { text: 'AVVELENATO', onclick: () => showStatusInfo('AVVELENATO') },
        { text: `! -${d} HP` }
      ], cls:'status' });
    }
    if (st.type === 'BRUCIATO') {
      const d = 5 * st.stacks;
      takeDmg(rot, d);
      logs.push({ parts:[
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' brucia (' },
        { text: 'BRUCIATO', onclick: () => showStatusInfo('BRUCIATO') },
        { text: ` x${st.stacks})! -${d} HP` }
      ], cls:'dmg' });
    }
    if (st.type === 'STRAFATTO') {
      st.turns--;
      if (st.turns <= 0) {
        toRemove.push(st);
        logs.push({ parts:[
          { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
          { text: ' non è più ' },
          { text: 'STRAFATTO', onclick: () => showStatusInfo('STRAFATTO') },
          { text: '.' }
        ], cls:'info' });
      }
    }
    if (st.type === 'BURNOUT') {
      st.turns--;
      if (st.turns <= 0) {
        toRemove.push(st);
        logs.push({ parts:[
          { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
          { text: ' non è più in ' },
          { text: 'BURNOUT', onclick: () => showStatusInfo('BURNOUT') },
          { text: '.' }
        ], cls:'info' });
      }
    }
    if (st.type === 'TASCHE BUCATE' && runState) {
      if (rot.isPlayer) {
        const lost = Math.min(5, runState.gold);
        if (lost > 0) {
          runState.gold -= lost;
          updateHud();
          showGoldFloat(-lost);
          logs.push({ parts:[
            { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
            { text: ' ha le ' },
            { text: 'TASCHE BUCATE', onclick: () => showStatusInfo('TASCHE BUCATE') },
            { text: `! -${lost} gold` }
          ], cls:'status' });
        }
      } else {
        runState.gold += 5;
        updateHud();
        showGoldFloat(5);
        logs.push({ parts:[
          { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
          { text: ' ha le ' },
          { text: 'TASCHE BUCATE', onclick: () => showStatusInfo('TASCHE BUCATE') },
          { text: '! Il giocatore guadagna 5 gold' }
        ], cls:'status' });
      }
    }
  }
  // ── LANDLORDARE: per N turni il team recupera il 10% HP massimi a fine turno ──
  if (rot.landlordareTurns > 0) {
    const heal = applyHealPct(rot, 0.10, rot);
    if (heal > 0) {
      logs.push({ parts:[
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' recupera ' },
        { text: `${heal} HP grazie a ` },
        { text: 'LANDLORDARE', onclick: () => showLandlordareInfo(rot) },
        { text: '!' }
      ], cls:'info' });
    }
    rot.landlordareTurns--;
  }
  // ── AVANZI: il ROT recupera il 10% degli HP massimi a fine turno ──
  if (rot.items.includes('AVANZI')) {
    const heal = applyHealPct(rot, 0.10, rot);
    if (heal > 0) {
      logs.push({ parts:[
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' recupera ' },
        { text: `${heal} HP` },
        { text: ' grazie a ' },
        { text: 'AVANZI', onclick: () => showItemInfo('AVANZI') },
        { text: '!' }
      ], cls:'info' });
    }
  }
  // ── PIGGYBANK: a fine turno il giocatore guadagna 5 gold ──
  if (rot.items.includes('PIGGYBANK') && runState) {
    runState.gold += 5;
    updateHud();
    showGoldFloat(5);
    logs.push({ parts:[
      { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
      { text: ' attiva ' },
      { text: 'PIGGYBANK', onclick: () => showItemInfo('PIGGYBANK') },
      { text: '! Il giocatore guadagna 5 gold' }
    ], cls:'status' });
  }
  rot.statuses = rot.statuses.filter(s => !toRemove.includes(s));
  return logs;
}

const TYPE_ORDER = ['NORMIE','SCHIZO','PSYCHO','TROLL','CRYPTO','MOG','VAPE','BASED'];

// Font size automatico in base alla lunghezza della parola più lunga: parola corta -> carattere grande.
// Le singole parole non vanno mai a capo (white-space: nowrap nel CSS).
function fontSizeForWordLen(len) {
  if (len <= 3) return 12;
  if (len <= 5) return 11;
  if (len <= 6) return 10;
  return 9;
}
function typeTableHtml(type) {
  if (!type) return '';
  const tc = TYPE_COLORS[type] || { bg:'#333', text:'#aaa' };

  const data = TYPE_ORDER.map(t => {
    const ttc = TYPE_COLORS[t] || { bg:'#333', text:'#aaa' };
    let beats, loses, resistWords;
    if (t === 'BASED') {
      beats = 'BASED';
      loses = 'BASED';
      resistWords = ['—'];
    } else {
      const chart = TYPE_CHART[t] || { beats:[], loses:[] };
      beats = chart.beats[0] || '—';
      loses = chart.loses[0] || '—';
      resistWords = [t, ...chart.beats];
    }
    return { t, ttc, beats, loses, resistWords };
  });

  // Font size uniforme per colonna, basato sulla parola più lunga della colonna
  const nameFontSize   = fontSizeForWordLen(Math.max(...data.map(d => d.t.length)));
  const beatsFontSize  = fontSizeForWordLen(Math.max(...data.map(d => d.beats.length)));
  const losesFontSize  = fontSizeForWordLen(Math.max(...data.map(d => d.loses.length)));
  const resistFontSize = fontSizeForWordLen(Math.max(...data.flatMap(d => d.resistWords).map(w => w.length)));

  const rows = data.map(({ t, ttc, beats, loses, resistWords }) => {
    const beatsTc = TYPE_COLORS[beats] || { bg:'#333', text:'#aaa' };
    const losesTc = TYPE_COLORS[loses] || { bg:'#333', text:'#aaa' };
    const hl = t === type ? ' highlight' : '';
    return `
      <span class="type-table-name${hl}" style="background:${ttc.bg};color:${ttc.text};font-size:${nameFontSize}px">${t}</span>
      <span class="type-table-cell${hl}" style="background:${beatsTc.bg};color:${beatsTc.text};font-size:${beatsFontSize}px">${beats}</span>
      <span class="type-table-cell${hl}" style="background:${losesTc.bg};color:${losesTc.text};font-size:${losesFontSize}px">${loses}</span>
      <span class="type-table-cell cell-resist${hl}" style="background:${ttc.bg};color:${ttc.text};font-size:${resistFontSize}px">${resistWords.join('<br>')}</span>
    `;
  }).join('');

  return `
    <div class="type-table">
      <div class="type-table-title" style="background:${tc.bg};color:${tc.text}">${type}</div>
      <div class="type-table-row type-table-header">
        <span></span><span class="type-table-cell">💪</span><span class="type-table-cell">🔪</span><span class="type-table-cell cell-resist">🛡️</span>
      </div>
      <div class="type-table-row">${rows}</div>
    </div>
  `;
}

function initBattle() {
  applyBattleBackground();
  turnNum = 1;
  const lvl = 5;
  B = {
    player: [ mkRot(ROT_DEFS.MIKEY, lvl, true), mkRot(ROT_DEFS.BRASATO, lvl, true), mkRot(ROT_DEFS.POKE_MON, lvl, true) ],
    enemy:  [ mkRot(ROT_DEFS.TROLLO, lvl, false), mkRot(ROT_DEFS.CHEESECAKE, lvl, false), mkRot(ROT_DEFS.LOGAN_FRAUD, lvl, false) ],
    phase: 'ROT_SELECT',   // ROT_SELECT | MOVE_SELECT | TARGET_SELECT | READY | EXEC | END
    current: null,         // ROT in fase di selezione
    selMove: null,         // mossa selezionata
    assigned: {},          // uid → { move, targets }
    actedUids: new Set(),  // ROT che hanno già agito questo turno
  };
  // Demo items/drugs
  B.player.find(r => r.def === ROT_DEFS.BRASATO).items[0] = 'ZOCCOLI_DI_LEGNO';
  giveDrug(B.enemy.find(r => r.def === ROT_DEFS.CHEESECAKE), 'SABBIONE');

  B.tokenWidth = calibrateTokenWidth();
  document.getElementById('overlay').classList.remove('on');
  clearLog();
  log('Battaglia iniziata! Livello ' + lvl, 'info');
  render();
}

function calibrateTokenWidth() {
  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:absolute;visibility:hidden;top:-9999px;left:-9999px;display:flex;';
  document.body.appendChild(tmp);
  for (const rot of [...B.player, ...B.enemy]) {
    const tok = document.createElement('div');
    tok.className = 'spd-token player-spd';
    tok.innerHTML = `<div class="spd-dot"></div><span>${rot.def.name.split(' ')[0]}</span>`;
    tmp.appendChild(tok);
  }
  const w = Math.max(...Array.from(tmp.children).map(t => t.offsetWidth));
  document.body.removeChild(tmp);
  return w;
}

// ═══════════════════════════════════════════════════
// PLANNING PHASE — nuovo flusso manuale
// ═══════════════════════════════════════════════════

function startPlanningPhase() {
  // Reset assegnazioni per il nuovo turno
  B.player.forEach(r => r.action = null);
  B.enemy.forEach(r => r.action = null);
  B.assigned = {};
  B.current = null;
  B.selMove = null;
  B.actedUids = new Set();
  B.phase = 'ROT_SELECT';
  render();
}

// Step 1 → 2: giocatore clicca un ROT alleato
function onPlayerRotClick(rot) {
  if (B.phase !== 'ROT_SELECT') return;
  if (!rot.isAlive) return;
  B.current = rot;
  B.selMove = null;
  B.phase = 'MOVE_SELECT';
  render();
}

// Step 2 → 3: giocatore clicca una mossa
function onMoveClick(move) {
  if (B.phase !== 'MOVE_SELECT' || !B.current) return;
  B.selMove = move;
  if (move.target === 'ALLY_ALL') {
    autoAssignTarget(B.player.filter(r => r.isAlive));
  } else if (move.target === 'ENEMY_ALL') {
    autoAssignTarget(B.enemy.filter(r => r.isAlive));
  } else if (move.target === 'SELF') {
    autoAssignTarget([B.current]);
  } else {
    B.phase = 'TARGET_SELECT';
    render();
  }
}

function autoAssignTarget(targets) {
  closeInfo();
  B.assigned[B.current.uid] = { move: B.selMove, targets };
  B.current.action = { move: B.selMove, targets };
  B.current = null;
  B.selMove = null;
  const unassigned = B.player.filter(r => r.isAlive && !B.assigned[r.uid]);
  B.phase = unassigned.length === 0 ? 'READY' : 'ROT_SELECT';
  render();
}

// Step 3 → avanti: giocatore clicca il bersaglio
function onTargetClick(targetRot) {
  if (B.phase !== 'TARGET_SELECT') return;
  closeInfo();
  // Assegna azione al ROT corrente
  B.assigned[B.current.uid] = { move: B.selMove, targets: [targetRot] };
  B.current.action = { move: B.selMove, targets: [targetRot] };
  B.current = null;
  B.selMove = null;
  // Tutti i ROT vivi assegnati?
  const unassigned = B.player.filter(r => r.isAlive && !B.assigned[r.uid]);
  B.phase = unassigned.length === 0 ? 'READY' : 'ROT_SELECT';
  render();
}

// Pulsante INDIETRO
function canGoBack() {
  if (B.phase === 'MOVE_SELECT' || B.phase === 'TARGET_SELECT' || B.phase === 'READY') return true;
  if (B.phase === 'ROT_SELECT') return B.player.some(r => r.isAlive && B.assigned[r.uid]);
  return false;
}

function goBack() {
  if (B.phase === 'TARGET_SELECT') {
    // Torna a selezione mossa per il ROT corrente
    B.selMove = null;
    B.phase = 'MOVE_SELECT';
  } else if (B.phase === 'MOVE_SELECT') {
    // Deseleziona ROT, torna a SCEGLI ROT
    B.current = null;
    B.phase = 'ROT_SELECT';
  } else if (B.phase === 'READY' || B.phase === 'ROT_SELECT') {
    // Annulla l'ultima assegnazione, torna a selezione mossa per quell'ROT
    const assignedRots = B.player.filter(r => r.isAlive && B.assigned[r.uid]);
    if (assignedRots.length > 0) {
      const last = assignedRots[assignedRots.length - 1];
      delete B.assigned[last.uid];
      last.action = null;
      B.current = last;
      B.selMove = null;
      B.phase = 'MOVE_SELECT';
    } else {
      B.phase = 'ROT_SELECT';
    }
  }
  render();
}

// Click su area non interattiva dello schermo: annulla l'azione corrente / torna a cascata allo step precedente
function onStageBackgroundClick(event) {
  if (!B || B.phase === 'EXEC' || B.phase === 'END') return;
  const interactive = '.rot-card, button, .sbadge, #info-panel, #info-panel-secondary, ' +
    '#overlay, #progress-overlay, #shop-overlay, #rot-manager-overlay, #rot-confirm-overlay';
  if (event.target.closest(interactive)) return;
  if (canGoBack()) goBack();
}

// ═══════════════════════════════════════════════════
// AI
// ═══════════════════════════════════════════════════

function planAI() {
  const players  = B.player.filter(r => r.isAlive);
  const enemies  = B.enemy.filter(r => r.isAlive);
  for (const e of enemies) {
    const avail = e.moves.filter(m => m.curPp === Infinity || m.curPp > 0);
    const move  = avail[Math.floor(Math.random() * avail.length)];
    let targets;
    if (move.target === 'ALLY_ALL')  targets = enemies.slice();
    else if (move.target === 'SELF') targets = [e];
    else if (move.target === 'ENEMY_ALL') targets = players.slice();
    else if (move.target === 'ALLY') targets = [enemies[Math.floor(Math.random() * enemies.length)]];
    else targets = [players[Math.floor(Math.random() * players.length)]];
    e.action = { move, targets };
  }
}

// ═══════════════════════════════════════════════════
// EXECUTION
// ═══════════════════════════════════════════════════

async function executePhase() {
  if (B.phase !== 'READY') return;
  B.phase = 'EXEC';
  planAI();

  const actors = [
    ...B.player.filter(r => r.isAlive && r.action),
    ...B.enemy.filter(r => r.isAlive && r.action),
  ].sort((a,b) => {
    const sa = effStat(a,'spd'), sb = effStat(b,'spd');
    if (sa !== sb) return sb - sa;
    return a.isPlayer ? -1 : 1;
  });
  B.speedOrder = actors;

  log(`━━━ TURNO ${turnNum} ━━━`, 'sep');
  renderSpeedBar(actors);
  render();
  await wait(400);

  for (const rot of actors) {
    if (!rot.isAlive) continue;
    const { move } = rot.action;
    let targets = rot.action.targets;

    // ── COLLASSO: 50% di probabilità di saltare il turno ──
    const collasso = rot.statuses.find(s => s.type === 'COLLASSO');
    if (collasso) {
      if (Math.random() < 0.5) {
        rot.statuses = rot.statuses.filter(s => s !== collasso);
        logRich([
          { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
          { text: ' si sveglia dal ' },
          { text: 'COLLASSO', onclick: () => showStatusInfo('COLLASSO') },
          { text: '!' }
        ], 'info');
        render(); await wait(400);
      } else {
        logRich([
          { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
          { text: ' è in ' },
          { text: 'COLLASSO', onclick: () => showStatusInfo('COLLASSO') },
          { text: ' e salta il turno!' }
        ], 'status');
        render(); await wait(500);
        const colTok = document.querySelector(`.spd-token[data-uid="${rot.uid}"]`);
        if (colTok) colTok.classList.add('acted');
        await wait(250);
        continue;
      }
    }

    // ── Reindirizzamento bersaglio: se il bersaglio singolo è stato eliminato prima che il ROT agisse ──
    if (move.power > 0 && move.target !== 'ENEMY_ALL' && move.target !== 'ALLY_ALL' && targets.length === 1 && !targets[0].isAlive) {
      const oppTeam = rot.isPlayer ? B.enemy : B.player;
      const idx = oppTeam.indexOf(targets[0]);
      let replacement = null;
      if (idx !== -1) {
        for (let j = idx + 1; j < oppTeam.length; j++) {
          if (oppTeam[j].isAlive) { replacement = oppTeam[j]; break; }
        }
      }
      if (!replacement) replacement = oppTeam.find(r => r.isAlive);
      if (replacement) {
        targets = [replacement];
        logRich([
          { text: 'Bersaglio eliminato — attacco reindirizzato a ' },
          { text: replacement.def.name, onclick: () => showRotInfo(replacement.def) },
          { text: '!' }
        ], 'status');
        render(); await wait(400);
      }
    }

    const isUtility = !!move.effect;
    const alive = targets.filter(t => t.isAlive);
    if (!alive.length && !isUtility) continue;

    // ── STRAFATTO: 50% miss (solo attacchi con power) ──
    if (move.power > 0) {
      const strafatto = rot.statuses.find(s => s.type === 'STRAFATTO');
      if (strafatto && Math.random() < 0.5) {
        if (move.curPp !== Infinity) move.curPp--;
        logRich([
          { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
          { text: ' è ' },
          { text: 'STRAFATTO', onclick: () => showStatusInfo('STRAFATTO') },
          { text: ' e manca l\'attacco!' }
        ], 'status');
        render(); await wait(500);
        const missedTok = document.querySelector(`.spd-token[data-uid="${rot.uid}"]`);
        if (missedTok) missedTok.classList.add('acted');
        await wait(250);
        continue;
      }
    }

    // ── BURNOUT: non può ripetere la stessa mossa ──
    const burnout = rot.statuses.find(s => s.type === 'BURNOUT');
    if (burnout && rot.lastMove?.name === move.name) {
      if (move.curPp !== Infinity) move.curPp--;
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' è in ' },
        { text: 'BURNOUT', onclick: () => showStatusInfo('BURNOUT') },
        { text: ' e non può ripetere la stessa mossa!' }
      ], 'status');
      render(); await wait(500);
      const burnTok = document.querySelector(`.spd-token[data-uid="${rot.uid}"]`);
      if (burnTok) burnTok.classList.add('acted');
      await wait(250);
      continue;
    }

    // ── Mosse "non usabili consecutivamente": fallisce se usata anche nel turno precedente ──
    if (move.nonConsecutive && rot.lastMove?.name === move.name) {
      if (move.curPp !== Infinity) move.curPp--;
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: ' ma non può ripeterla due volte di fila e fallisce!' }
      ], 'status');
      render(); await wait(500);
      rot.lastMove = move;
      const failTok = document.querySelector(`.spd-token[data-uid="${rot.uid}"]`);
      if (failTok) failTok.classList.add('acted');
      await wait(250);
      continue;
    }
    rot.lastMove = move;

    if (move.curPp !== Infinity) move.curPp--;
    if (burnout && move.curPp !== Infinity && move.curPp > 0) move.curPp--;

    // ── HEAL ──
    if (move.effect === 'heal') {
      const healTeam = rot.isPlayer ? B.player : B.enemy;
      const healTargets = move.target === 'ALLY_ALL' ? healTeam.filter(r => r.isAlive) : [rot];
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      for (const tgt of healTargets) {
        const healAmt = applyHealPct(tgt, move.healPct, rot);
        logRich([
          { text: tgt.def.name, onclick: () => showRotInfo(tgt.def) },
          { text: ` recupera ${healAmt} HP!` }
        ], 'info');
      }
      buffHopAnim(healTargets);
      await wait(250);
      render(); await wait(350);

    // ── CLEANSE ──
    } else if (move.effect === 'cleanse') {
      const cleansTeam = rot.isPlayer ? B.player : B.enemy;
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      for (const tgt of cleansTeam.filter(r => r.isAlive)) {
        tgt.statuses = [];
        for (const stat of Object.keys(tgt.stages)) {
          if (tgt.stages[stat] < 0) tgt.stages[stat] = 0;
        }
        if (move.shieldPct) {
          applyShieldPct(tgt, move.shieldPct, rot);
        }
        logRich([
          { text: tgt.def.name, onclick: () => showRotInfo(tgt.def) },
          { text: move.shieldPct ? ' viene purificato e ottiene uno scudo!' : ' viene purificato!' }
        ], 'info');
      }
      if (move.shieldPct) {
        buffHopAnim(cleansTeam.filter(r => r.isAlive));
        await wait(250);
        render(); await wait(350);
      } else {
        render(); await wait(600);
      }

    // ── SHIELD ──
    } else if (move.effect === 'shield') {
      const shieldTeam = rot.isPlayer ? B.player : B.enemy;
      const shieldTargets = move.target === 'ALLY_ALL' ? shieldTeam.filter(r => r.isAlive) : [rot];
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      for (const tgt of shieldTargets) {
        const shieldAmt = applyShieldPct(tgt, move.shieldPct, rot);
        logRich([
          { text: tgt.def.name, onclick: () => showRotInfo(tgt.def) },
          { text: ` ottiene uno scudo da ${shieldAmt}!` }
        ], 'info');
      }
      buffHopAnim(shieldTargets);
      await wait(250);
      render(); await wait(350);

    // ── GUARD NEXT (URCA): -50% danno dal prossimo attacco ricevuto ──
    } else if (move.effect === 'guard_next') {
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      rot.guardNext = { reduction: move.reduction };
      render(); await wait(600);

    // ── GUARD TURN (SHAKER PROTEICO ecc.): -50% danno per il turno + status all'attaccante ──
    } else if (move.effect === 'guard_turn') {
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      rot.guardTurn = { reduction: move.reduction, counterStatus: move.counterStatus };
      render(); await wait(600);

    // ── IMMUNITY (BESTEMMIA): protezione completa per 1 turno ──
    } else if (move.effect === 'immunity') {
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      rot.immuneTurn = true;
      render(); await wait(600);

    // ── COUNTER (PROVACI): +X% danno subito dal prossimo attacco, restituisce Y% del danno subito ──
    } else if (move.effect === 'counter') {
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      rot.counterNext = { vulnPct: move.vulnPct, returnPct: move.returnPct };
      render(); await wait(600);

    // ── STAGE ──
    } else if (move.effect === 'stage') {
      const allyTeam  = rot.isPlayer ? B.player : B.enemy;
      const enemyTeam = rot.isPlayer ? B.enemy  : B.player;
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      const buffedRots = new Set();
      for (const stg of move.stages) {
        const team = stg.team === 'SELF' ? [rot] : stg.team === 'ALLY' ? allyTeam : enemyTeam;
        for (const r of team.filter(r => r.isAlive)) {
          const old = r.stages[stg.stat] || 0;
          const next = Math.max(-8, Math.min(8, old + stg.delta));
          if (next === old) continue;
          r.stages[stg.stat] = next;
          const arrow = stg.delta > 0 ? '▲' : '▼';
          if (stg.delta > 0) buffedRots.add(r);
          logRich([
            { text: r.def.name, onclick: () => showRotInfo(r.def) },
            { text: `: ${STAGE_STAT_LABELS[stg.stat]} ${arrow} (stadio ${next >= 0 ? '+' : ''}${next})` }
          ], 'status');
        }
      }
      if (buffedRots.size) {
        buffHopAnim([...buffedRots]);
        await wait(250);
        render(); await wait(350);
      } else {
        render(); await wait(600);
      }

    // ── RESET STAGES (APRI LE FINESTRE) ──
    } else if (move.effect === 'reset_stages') {
      const allyTeam = rot.isPlayer ? B.player : B.enemy;
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      for (const r of allyTeam.filter(r => r.isAlive)) {
        const hadMalusStages = Object.values(r.stages).some(v => v < 0);
        const hadMalusStatus = r.statuses.length > 0;
        if (!hadMalusStages && !hadMalusStatus) continue;
        r.statuses = [];
        for (const stat of Object.keys(r.stages)) {
          if (r.stages[stat] < 0) r.stages[stat] = 0;
        }
        logRich([
          { text: r.def.name, onclick: () => showRotInfo(r.def) },
          { text: ': tutti i malus sono stati rimossi!' }
        ], 'status');
      }
      render(); await wait(600);

    // ── CRIT BOOST (POTERI FORTI) ──
    } else if (move.effect === 'crit_boost') {
      const allyTeam = rot.isPlayer ? B.player : B.enemy;
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      for (const r of allyTeam.filter(r => r.isAlive)) {
        r.critChanceOverride = move.critChance;
      }
      logRich([
        { text: 'La squadra ottiene il ' },
        { text: `${Math.round(move.critChance * 100)}% di probabilità di colpo critico per tutta la battaglia!` }
      ], 'status');
      render(); await wait(600);

    // ── TEAM REGEN (LANDLORDARE) ──
    } else if (move.effect === 'team_regen') {
      const allyTeam = rot.isPlayer ? B.player : B.enemy;
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      for (const r of allyTeam.filter(r => r.isAlive)) {
        r.landlordareTurns = move.turns;
      }
      logRich([
        { text: 'La squadra recupera il ' },
        { text: `${Math.round(move.healPct * 100)}% degli HP massimi a fine turno per ${move.turns} turni!` }
      ], 'status');
      render(); await wait(600);

    // ── COPY MALUS (TOH) ──
    } else if (move.effect === 'copy_malus') {
      const enemyTeam = rot.isPlayer ? B.enemy : B.player;
      const source = targets[0];
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' usa ' },
        { text: move.name, onclick: () => showMoveInfo(move) },
        { text: '!' }
      ], 'info');
      const malusStatuses = source.statuses.slice();
      const malusStages = Object.entries(source.stages).filter(([, v]) => v < 0);
      if (!malusStatuses.length && !malusStages.length) {
        logRich([
          { text: source.def.name, onclick: () => showRotInfo(source.def) },
          { text: ' non ha malus da copiare!' }
        ], 'info');
      } else {
        logRich([
          { text: 'Tutti i malus di ' },
          { text: source.def.name, onclick: () => showRotInfo(source.def) },
          { text: ' vengono copiati su tutti i nemici!' }
        ], 'status');
        for (const tgt of enemyTeam.filter(r => r.isAlive)) {
          for (const st of malusStatuses) {
            const ex = tgt.statuses.find(s => s.type === st.type);
            if (st.type === 'BRUCIATO') {
              if (ex) ex.stacks = Math.min(3, ex.stacks + st.stacks);
              else tgt.statuses.push({ ...st });
            } else if (st.type === 'FERITE') {
              if (ex) ex.stacks = Math.min(5, ex.stacks + st.stacks);
              else tgt.statuses.push({ ...st });
            } else if (!ex) {
              tgt.statuses.push({ ...st });
            }
            logRich([
              { text: tgt.def.name, onclick: () => showRotInfo(tgt.def) },
              { text: ' è ' },
              { text: st.type, onclick: () => showStatusInfo(st.type) },
              { text: '!' }
            ], 'status');
          }
          for (const [stat, delta] of malusStages) {
            const old = tgt.stages[stat] || 0;
            const next = Math.max(-8, Math.min(8, old + delta));
            if (next === old) continue;
            tgt.stages[stat] = next;
            logRich([
              { text: tgt.def.name, onclick: () => showRotInfo(tgt.def) },
              { text: `: ${STAGE_STAT_LABELS[stat]} ▼ (stadio ${next})` }
            ], 'status');
          }
        }
      }
      render(); await wait(600);

    // ── DANNO ──
    } else if (move.power > 0) {
      let totalDmgDealt = 0;
      // RUGPULL: danno base + 1 per ogni gold in banca del giocatore
      const dmgMove = move.goldScalePower
        ? { ...move, power: move.goldScalePower.base + move.goldScalePower.perGold * (runState ? runState.gold : 0) }
        : move;
      // ── SBUBBO: il ROT attacca due volte consecutivamente con la stessa mossa ──
      const sbubboHits = rot.items.includes('SBUBBO') ? 2 : 1;
      for (let sbubboHit = 0; sbubboHit < sbubboHits; sbubboHit++) {
      if (sbubboHit > 0 && !rot.isAlive) break;
      const hitTargets = targets.filter(t => t.isAlive);
      if (!hitTargets.length) break;
      attackAnim(rot);
      await wait(150);
      for (const tgt of hitTargets) {
        logRich([
          { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
          { text: ' usa ' },
          { text: move.name, onclick: () => showMoveInfo(move) },
          { text: '!' }
        ], 'info');

        // ── Numero di colpi su questo bersaglio (mosse multi-colpo) ──
        let hitCount = move.hits || 1;
        if (move.multiHit) {
          // Ogni 10 punti della statistica indicata = +10% di probabilità di sferrare il colpo successivo
          const statVal = effStat(rot, move.multiHit.statKey);
          const extraChance = Math.min(1, Math.floor(statVal / 10) * 0.10);
          hitCount = 1;
          for (let extra = 0; extra < move.multiHit.maxHits - 1; extra++) {
            if (Math.random() < extraChance) hitCount++;
            else break;
          }
        }

        for (let hitIdx = 0; hitIdx < hitCount; hitIdx++) {
        if (!tgt.isAlive) break;

        const res = calcDmg(rot, tgt, dmgMove);
        if (res.tm === 2)   log('Super efficace!', 'super');
        if (res.tm === 0.5) log('Non molto efficace...', 'resist');
        if (res.crit)       log('CRITICO!', 'crit');

        let dmg = res.dmg;

        // ── BESTEMMIA: protezione completa, nessun danno ──
        if (tgt.immuneTurn) {
          dmg = 0;
          logRich([
            { text: tgt.def.name, onclick: () => showRotInfo(tgt.def) },
            { text: ' è protetto da ' },
            { text: 'BESTEMMIA', onclick: () => showMoveInfo(GENERIC_MOVE_DEFS.BESTEMMIA) },
            { text: ' e non subisce danno!' }
          ], 'status');
          render(); await wait(500);
        } else {
          // ── URCA: -50% danno dal prossimo attacco (one-shot) ──
          if (tgt.guardNext) {
            dmg = Math.floor(dmg * (1 - tgt.guardNext.reduction));
            tgt.guardNext = null;
          }
          // ── SHAKER PROTEICO ecc.: -50% danno per il turno + status all'attaccante ──
          if (tgt.guardTurn) {
            dmg = Math.floor(dmg * (1 - tgt.guardTurn.reduction));
            const ok = addStatus(rot, tgt.guardTurn.counterStatus);
            if (ok) {
              const st = rot.statuses.find(s => s.type === tgt.guardTurn.counterStatus);
              logRich([
                { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
                { text: tgt.guardTurn.counterStatus === 'FERITE' ? ' ha ' : ' è ' },
                { text: tgt.guardTurn.counterStatus, onclick: () => showStatusInfo(tgt.guardTurn.counterStatus) },
                { text: `${st && st.stacks > 1 ? ' (x' + st.stacks + ')' : ''}!` }
              ], 'status');
              render(); await wait(350);
            }
          }
          // ── PROVACI: +X% danno subito dal prossimo attacco (one-shot) ──
          if (tgt.counterNext) {
            dmg = Math.floor(dmg * (1 + tgt.counterNext.vulnPct));
          }
        }

        takeDmg(tgt, dmg);
        totalDmgDealt += dmg;
        logRich([
          { text: tgt.def.name, onclick: () => showRotInfo(tgt.def) },
          { text: hitCount > 1 ? ` subisce ${dmg} danni! (colpo ${hitIdx + 1}/${hitCount})` : ` subisce ${dmg} danni!` }
        ], 'dmg');

        flashHit(tgt.uid);
        hitRecoilAnim(tgt);
        await wait(300);
        render();
        await wait(150);

        // ── PROVACI: restituisce una percentuale del danno subito all'attaccante (one-shot) ──
        if (tgt.counterNext && dmg > 0 && rot.isAlive) {
          const counterDmg = Math.max(1, Math.floor(dmg * tgt.counterNext.returnPct));
          takeDmg(rot, counterDmg);
          logRich([
            { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
            { text: ' subisce ' },
            { text: `${counterDmg} danni` },
            { text: ' di ' },
            { text: 'PROVACI', onclick: () => showMoveInfo(GENERIC_MOVE_DEFS.PROVACI) },
            { text: '!' }
          ], 'dmg');
          render();
          await wait(500);
          if (!rot.isAlive) {
            logRich([
              { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
              { text: ' è KO per ' },
              { text: 'PROVACI', onclick: () => showMoveInfo(GENERIC_MOVE_DEFS.PROVACI) },
              { text: '!' }
            ], 'dmg');
            render();
            await wait(500);
            if (checkEnd()) return;
          }
        }

        // ── ZECCA COMUNISTA: l'attaccante drena il 50% del danno infierito come HP ──
        if (dmg > 0 && rot.items.includes('ZECCA_COMUNISTA') && rot.isAlive) {
          const drainAmt = applyHealAmount(rot, dmg * 0.5, rot);
          if (drainAmt > 0) {
            logRich([
              { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
              { text: ' recupera ' },
              { text: `${drainAmt} HP` },
              { text: ' grazie a ' },
              { text: 'ZECCA COMUNISTA', onclick: () => showItemInfo('ZECCA_COMUNISTA') },
              { text: '!' }
            ], 'info');
            render();
            await wait(400);
          }
        }

        // ── SPINACIO: restituisce il 20% del danno subito all'attaccante ──
        if (dmg > 0 && tgt.items.includes('SPINACIO') && rot.isAlive) {
          const reflectDmg = Math.max(1, Math.floor(dmg * 0.20));
          takeDmg(rot, reflectDmg);
          logRich([
            { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
            { text: ' subisce ' },
            { text: `${reflectDmg} danni` },
            { text: ' di ' },
            { text: 'SPINACIO', onclick: () => showItemInfo('SPINACIO') },
            { text: '!' }
          ], 'dmg');
          render();
          await wait(400);
          if (!rot.isAlive) {
            logRich([
              { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
              { text: ' è KO per ' },
              { text: 'SPINACIO', onclick: () => showItemInfo('SPINACIO') },
              { text: '!' }
            ], 'dmg');
            render();
            await wait(500);
            if (checkEnd()) return;
          }
        }
        tgt.counterNext = null;

        const statusChance = move.status ? move.status.chance + (rot.items.includes('PORTAFORTUNA') ? 0.25 : 0) : 0;
        if (move.status && Math.random() < statusChance) {
          const stType = move.status.type === 'RANDOM'
            ? RANDOM_STATUSES[Math.floor(Math.random() * RANDOM_STATUSES.length)]
            : move.status.type;
          const ok = addStatus(tgt, stType);
          if (ok) {
            const st = tgt.statuses.find(s => s.type === stType);
            logRich([
              { text: tgt.def.name, onclick: () => showRotInfo(tgt.def) },
              { text: stType === 'FERITE' ? ' ha ' : ' è ' },
              { text: stType, onclick: () => showStatusInfo(stType) },
              { text: `${st&&st.stacks>1?' (x'+st.stacks+')':''}!` }
            ], 'status');
            render();
            await wait(350);
          }
        }

        if (!tgt.isAlive) {
          logRich([
            { text: tgt.def.name, onclick: () => showRotInfo(tgt.def) },
            { text: ' è KO!' }
          ], 'dmg');
          render();
          await wait(500);
          if (checkEnd()) return;
        }
        }

        // ── EVASIONE FISCALE: gold per ogni bersaglio colpito ──
        if (move.goldPerHit && runState) {
          if (rot.isPlayer) {
            runState.gold += move.goldPerHit;
            updateHud();
            showGoldFloat(move.goldPerHit);
            logRich([
              { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
              { text: ' usa ' },
              { text: move.name, onclick: () => showMoveInfo(move) },
              { text: `! Il giocatore guadagna ${move.goldPerHit} gold` }
            ], 'status');
            render(); await wait(350);
          } else if (runState.gold > 0) {
            const lost = Math.min(move.goldPerHit, runState.gold);
            runState.gold -= lost;
            updateHud();
            showGoldFloat(-lost);
            logRich([
              { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
              { text: ' usa ' },
              { text: move.name, onclick: () => showMoveInfo(move) },
              { text: `! Il giocatore perde ${lost} gold` }
            ], 'status');
            render(); await wait(350);
          }
        }
      }

      // Recoil: percentuale del danno totale inflitto al bersaglio
      if (move.recoil && rot.isAlive) {
        const recoilDmg = Math.max(1, Math.round(totalDmgDealt * move.recoil / 100));
        takeDmg(rot, recoilDmg);
        logRich([
          { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
          { text: ` subisce ${recoilDmg} danni di recoil!` }
        ], 'dmg');
        render(); await wait(400);
        if (!rot.isAlive) {
          logRich([
            { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
            { text: ' è KO per il recoil!' }
          ], 'dmg');
          render(); await wait(500);
          if (checkEnd()) return;
        }
      }
      }
    }

    const tok = document.querySelector(`.spd-token[data-uid="${rot.uid}"]`);
    if (tok) tok.classList.add('acted');
    await wait(250);
  }

  // ── Le protezioni "per il turno" (guard_turn / immunity) durano solo fino a fine turno ──
  for (const r of [...B.player, ...B.enemy]) {
    r.guardTurn = null;
    r.immuneTurn = null;
  }

  log('— status di fine turno —', 'sep');
  const allAlive = [...B.player, ...B.enemy].filter(r => r.isAlive);
  for (const rot of allAlive) {
    const entries = endTurnStatuses(rot);
    for (const e of entries) {
      logRich(e.parts, e.cls);
      render();
      await wait(380);
    }
    if (!rot.isAlive) {
      logRich([
        { text: rot.def.name, onclick: () => showRotInfo(rot.def) },
        { text: ' è KO per gli status!' }
      ], 'dmg');
      render();
      await wait(500);
      if (checkEnd()) return;
    }
  }

  turnNum++;
  document.getElementById('turn-info').textContent = `TURNO ${turnNum}`;
  startPlanningPhase();
}

function checkEnd() {
  const pa = B.player.filter(r => r.isAlive).length;
  const ea = B.enemy.filter(r => r.isAlive).length;
  if (pa === 0) { endBattle(false); return true; }
  if (ea === 0) { endBattle(true);  return true; }
  return false;
}

function endBattle(win) {
  B.phase = 'END';
  if (runState) {
    if (win) showVictoryScreen();
    else showGameOverScreen();
    return;
  }
  document.getElementById('ov-title').textContent = win ? 'VITTORIA' : 'SCONFITTA';
  document.getElementById('ov-title').className = win ? 'win' : 'lose';
  document.getElementById('ov-sub').textContent = win
    ? `Turni impiegati: ${turnNum}`
    : 'Tutti i tuoi Rot sono caduti.';
  document.getElementById('overlay').classList.add('on');
}

// PROGRESSIONE DELLA RUN
// ═══════════════════════════════════════════════════

let runState = null; // { level, gold, enemyCount, battlesWon, roster:[ROT...] }

const STAT_LABELS = { hp:'HP', atk:'ATK', spAtk:'SP.ATK', def:'DEF', spDef:'SP.DEF', spd:'SPD' };

function updateHud() {
  const lvlEl  = document.getElementById('hud-level');
  const goldEl = document.getElementById('hud-gold-text');
  if (!runState) return;
  lvlEl.textContent  = `LIVELLO ${runState.level}`;
  goldEl.textContent = `$ GOLD ${runState.gold}`;
}

// Animazione "+Xg"/"-Xg" che scorre via dal contatore gold, in tempo reale
function showGoldFloat(amount) {
  const host = document.getElementById('hud-gold');
  if (!host || !amount) return;
  const el = document.createElement('span');
  el.className = `gold-float ${amount > 0 ? 'gold-float-pos' : 'gold-float-neg'}`;
  el.textContent = `${amount > 0 ? '+' : ''}${amount}g`;
  host.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// 1 turno = 6 gold, 2-3 turni = 4 gold, 4+ turni = 3 gold; bonus +2% per livello
function calcGoldReward(turns, level) {
  const base = turns === 1 ? 6 : (turns <= 3 ? 4 : 3);
  return Math.round(base * (1 + level * 0.02));
}

function pickRandomDefs(count, exclude = []) {
  const allKeys = Object.keys(ROT_DEFS);
  const picked = [];
  while (picked.length < count) {
    const def = ROT_DEFS[allKeys[Math.floor(Math.random() * allKeys.length)]];
    if (!exclude.includes(def) && !picked.includes(def)) picked.push(def);
  }
  return picked;
}

// Interessi: +1 gold per ogni 10 gold in banca, cap a 50 gold in banca (max +5 gold)
function calcInterest(bankGold) {
  return Math.min(5, Math.floor(Math.min(bankGold, 50) / 10));
}

// Applica gold + level up ai sopravvissuti, rimuove i caduti per sempre
function applyVictoryProgression() {
  const interestEarned = calcInterest(runState.gold);
  const goldEarned = calcGoldReward(turnNum, runState.level);
  runState.gold += goldEarned + interestEarned;

  const survivors = runState.roster.filter(r => r.isAlive);
  const dead      = runState.roster.filter(r => !r.isAlive);
  runState.roster = survivors;

  const levelUps = [];
  for (const rot of survivors) {
    const oldStats = { ...rot.stats };
    rot.level += 1;
    const newStats = {
      hp:    rot.def.base.hp    + rot.level,
      atk:   rot.def.base.atk   + rot.level,
      spAtk: rot.def.base.spAtk + rot.level,
      def:   rot.def.base.def   + rot.level,
      spDef: rot.def.base.spDef + rot.level,
      spd:   rot.def.base.spd   + rot.level,
    };
    const hpGain = newStats.hp - oldStats.hp;
    rot.stats = newStats;
    rot.maxHp = newStats.hp;
    rot.curHp = Math.min(rot.maxHp, rot.curHp + hpGain);
    levelUps.push({ rot, oldStats, newStats });
  }

  runState.level += 1;
  runState.battlesWon += 1;

  return { goldEarned, interestEarned, survivors, dead, levelUps };
}

function renderLevelUpPanel(levelUps) {
  const panel = document.getElementById('levelup-panel');
  if (!levelUps.length) {
    panel.classList.remove('visible');
    panel.innerHTML = '';
    return;
  }
  panel.classList.add('visible');
  panel.innerHTML = `<div class="levelup-title">LEVEL UP!</div>` + levelUps.map(({ rot, oldStats, newStats }) => `
    <div class="levelup-card">
      <div class="levelup-name">${rot.def.name} <span class="levelup-lvl">→ LIV ${rot.level}</span></div>
      <div class="levelup-stats">
        ${Object.keys(STAT_LABELS).map(s => {
          const inc = newStats[s] > oldStats[s];
          return `<div class="levelup-stat ${inc ? 'increased' : ''}">
            <span class="lu-lbl">${STAT_LABELS[s]}</span>
            <span class="lu-val">${newStats[s]}${inc ? '<span class="lu-plus">▲</span>' : ''}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function showVictoryScreen() {
  const { goldEarned, interestEarned, survivors, dead, levelUps } = applyVictoryProgression();
  updateHud();

  const title = document.getElementById('progress-title');
  title.textContent = 'VITTORIA';
  title.className = 'win';

  document.getElementById('progress-sub').innerHTML =
    `Turni impiegati: ${turnNum} — Livello raggiunto: <strong>${runState.level}</strong>`;

  const survHtml = survivors.map(r =>
    `<div class="surv-card"><span class="surv-name">${r.def.name}</span><span class="surv-level">LIV ${r.level}</span></div>`
  ).join('');
  const deadHtml = dead.map(r =>
    `<div class="dead-card"><span class="dead-name">${r.def.name}</span><span class="dead-tag">PERSO PER SEMPRE</span></div>`
  ).join('');
  document.getElementById('progress-survivors').innerHTML = `
    <div class="progress-section-lbl">ROT SOPRAVVISSUTI</div>
    <div class="surv-list">${survHtml || '<div class="surv-card">Nessuno...</div>'}</div>
    ${dead.length ? `<div class="progress-section-lbl dead-lbl">ROT PERSI</div><div class="surv-list">${deadHtml}</div>` : ''}
  `;

  const goldEl = document.getElementById('progress-gold');
  goldEl.style.display = '';
  goldEl.innerHTML = `
    <div class="progress-gold-line">GOLD GUADAGNATO: +${goldEarned}g</div>
    ${interestEarned > 0 ? `<div class="progress-gold-line interest">INTERESSI: +${interestEarned}g</div>` : ''}
    <div class="progress-gold-line total">TOTALE: ${runState.gold}g</div>
  `;

  document.getElementById('progress-continue-btn').style.display = '';
  document.getElementById('progress-restart-btn').style.display = 'none';

  renderLevelUpPanel(levelUps);
  document.getElementById('progress-overlay').classList.add('on');
}

function showGameOverScreen() {
  playLostMusic();
  const title = document.getElementById('progress-title');
  title.textContent = 'GAME OVER';
  title.className = 'lose';

  document.getElementById('progress-sub').innerHTML =
    `Tutti i tuoi ROT sono caduti.<br>Record: <strong>${runState.battlesWon}</strong> battaglie sopravvissute`;
  document.getElementById('progress-survivors').innerHTML = '';
  document.getElementById('progress-gold').textContent = '';
  document.getElementById('progress-gold').style.display = 'none';

  document.getElementById('progress-continue-btn').style.display = 'none';
  document.getElementById('progress-restart-btn').style.display = '';

  renderLevelUpPanel([]);
  document.getElementById('progress-overlay').classList.add('on');
}

function continueRun() {
  document.getElementById('progress-overlay').classList.remove('on');
  openShop();
}

function shopContinue() {
  document.getElementById('shop-overlay').classList.remove('on');
  shopState = null;
  runState.enemyCount = Math.min(3, runState.enemyCount + 1);
  startNextBattle();
}

// NEGOZIO
// ═══════════════════════════════════════════════════

const ROT_PRICE   = 3;
const ITEM_PRICE  = { comune:2, rara:4, atomica:7, apocalittica:15 };
const DRUG_PRICE  = { comune:1, rara:3, atomica:6 };
const MOVE_PRICE  = { comune:2, rara:4, atomica:7, tipo:2 };

const ITEM_RARITY_WEIGHTS = { comune:80, rara:15, atomica:4, apocalittica:1 };
const DRUG_RARITY_WEIGHTS = { comune:80, rara:15, atomica:5 };
const MOVE_RARITY_WEIGHTS = { comune:70, rara:15, atomica:5, tipo:10 };

let shopState = null;

function rollRarity(weights) {
  const total = Object.values(weights).reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (const [k,w] of Object.entries(weights)) {
    if (r < w) return k;
    r -= w;
  }
  return Object.keys(weights)[0];
}

function rollShopRot() {
  const keys = Object.keys(ROT_DEFS);
  const key = keys[Math.floor(Math.random() * keys.length)];
  return { key, price: ROT_PRICE };
}

function rollShopItem() {
  const rarity = rollRarity(ITEM_RARITY_WEIGHTS);
  const keys = Object.keys(ITEM_DEFS).filter(k => ITEM_DEFS[k].rarity === rarity);
  const key = keys[Math.floor(Math.random() * keys.length)];
  return { key, price: ITEM_PRICE[rarity] };
}

function rollShopDrug() {
  const rarity = rollRarity(DRUG_RARITY_WEIGHTS);
  const keys = Object.keys(DRUG_DEFS).filter(k => DRUG_DEFS[k].rarity === rarity);
  const key = keys[Math.floor(Math.random() * keys.length)];
  return { key, price: DRUG_PRICE[rarity] };
}

function rollShopMove() {
  const rarity = rollRarity(MOVE_RARITY_WEIGHTS);
  if (rarity === 'tipo') {
    const keys = Object.keys(TYPE_MOVE_DEFS);
    const key = keys[Math.floor(Math.random() * keys.length)];
    return { key, pool:'type', price: MOVE_PRICE.tipo };
  }
  const keys = Object.keys(GENERIC_MOVE_DEFS).filter(k => GENERIC_MOVE_DEFS[k].rarity === rarity);
  const key = keys[Math.floor(Math.random() * keys.length)];
  return { key, pool:'generic', price: MOVE_PRICE[rarity] };
}

function shopMoveDef(offer) {
  return offer.pool === 'type' ? TYPE_MOVE_DEFS[offer.key] : GENERIC_MOVE_DEFS[offer.key];
}

function rollShopOffers() {
  return {
    rerollCounts: { rot:0, items:0, drugs:0, moves:0 },
    rot: rollShopRot(),
    items: [rollShopItem(), rollShopItem()],
    drugs: [rollShopDrug()],
    moves: [rollShopMove(), rollShopMove()],
    bought: { rot:false, items:[false,false], drugs:[false], moves:[false,false] },
    pendingPurchase: null,
  };
}

function openShop() {
  closeAllBattlePanels();
  shopState = rollShopOffers();
  document.getElementById('shop-overlay').classList.add('on');
  renderShop();
}

function rerollSection(section) {
  const cost = shopState.rerollCounts[section] + 1;
  if (runState.gold < cost) return;
  runState.gold -= cost;
  shopState.rerollCounts[section] += 1;
  shopState.pendingPurchase = null;
  if (section === 'rot') {
    shopState.rot = rollShopRot();
    shopState.bought.rot = false;
  } else if (section === 'items') {
    shopState.items = [rollShopItem(), rollShopItem()];
    shopState.bought.items = [false,false];
  } else if (section === 'drugs') {
    shopState.drugs = [rollShopDrug()];
    shopState.bought.drugs = [false];
  } else if (section === 'moves') {
    shopState.moves = [rollShopMove(), rollShopMove()];
    shopState.bought.moves = [false,false];
  }
  updateHud();
  renderShop();
}

function buyRot() {
  if (shopState.bought.rot) return;
  if (runState.gold < shopState.rot.price) return;
  if (runState.roster.length >= 3) {
    renderRotReplaceConfirm();
    return;
  }
  runState.gold -= shopState.rot.price;
  const def = ROT_DEFS[shopState.rot.key];
  runState.roster.push(mkRot(def, runState.level, true));
  shopState.bought.rot = true;
  updateHud();
  renderShop();
}

// ── squadra piena: chiedi se sostituire un ROT con quello da acquistare ──
function renderRotReplaceConfirm() {
  const def = ROT_DEFS[shopState.rot.key];
  document.getElementById('rot-confirm-content').innerHTML = `
    <div class="rot-confirm-text">Vuoi sostituire un ROT già posseduto con <b style="color:#fde68a">${def.name}</b>?</div>
    <div class="rot-confirm-buttons">
      <button class="shop-picker-btn" onclick="startRotReplace()">SI FRATM</button>
      <button class="shop-picker-btn shop-picker-cancel" onclick="cancelRotReplaceConfirm()">NAAAA</button>
    </div>
  `;
  document.getElementById('rot-confirm-overlay').classList.add('on');
}
function cancelRotReplaceConfirm() {
  document.getElementById('rot-confirm-overlay').classList.remove('on');
}
function startRotReplace() {
  document.getElementById('rot-confirm-overlay').classList.remove('on');
  pendingRotReplace = true;
  openRotManager();
}

// ── finestrella: confermare l'abbandono del ROT selezionato per la sostituzione ──
let pendingRotReplaceTarget = null;
function confirmRotReplace(uid) {
  pendingRotReplaceTarget = uid;
  document.getElementById('rot-confirm-content').innerHTML = `
    <div class="rot-confirm-text">Sicuro di abbandonare sto povero ROT?</div>
    <div class="rot-confirm-buttons">
      <button class="shop-picker-btn" onclick="completeRotReplace()">SI :(</button>
      <button class="shop-picker-btn shop-picker-cancel" onclick="cancelRotReplaceTarget()">NO</button>
    </div>
  `;
  document.getElementById('rot-confirm-overlay').classList.add('on');
}
function cancelRotReplaceTarget() {
  pendingRotReplaceTarget = null;
  document.getElementById('rot-confirm-overlay').classList.remove('on');
}
function completeRotReplace() {
  const idx = runState.roster.findIndex(r => r.uid === pendingRotReplaceTarget);
  if (idx === -1) return;
  runState.gold -= shopState.rot.price;
  runState.gold += ROT_PRICE; // accredita la vendita del ROT sostituito
  const def = ROT_DEFS[shopState.rot.key];
  runState.roster[idx] = mkRot(def, runState.level, true);
  shopState.bought.rot = true;
  pendingRotReplace = false;
  pendingRotReplaceTarget = null;
  document.getElementById('rot-confirm-overlay').classList.remove('on');
  updateHud();
  closeRotManager();
  renderShop();
}

function sellRot(uid) {
  const idx = runState.roster.findIndex(r => r.uid === uid);
  if (idx === -1) return;
  runState.roster.splice(idx, 1);
  runState.gold += ROT_PRICE;
  updateHud();
  renderShop();
}

function buyItem(idx) {
  if (shopState.bought.items[idx]) return;
  if (runState.gold < shopState.items[idx].price) return;
  shopState.pendingPurchase = { type:'item', idx };
  renderShop();
  openRotManager();
}

function buyDrug() {
  if (shopState.bought.drugs[0]) return;
  if (runState.gold < shopState.drugs[0].price) return;
  shopState.pendingPurchase = { type:'drug', idx:0 };
  renderShop();
  openRotManager();
}

function buyMove(idx) {
  if (shopState.bought.moves[idx]) return;
  if (runState.gold < shopState.moves[idx].price) return;
  shopState.pendingPurchase = { type:'move', idx };
  renderShop();
  openRotManager();
}

function cancelPurchase() {
  shopState.pendingPurchase = null;
  moveAssignState = null;
  closeRotManager();
  renderShop();
}

// ── banner di assegnazione acquisto, condiviso dalle 3 modalità ──
function renderAssignBanner(p, assignMode, kind) {
  const banner = document.getElementById('rot-manager-assign-banner');
  document.getElementById('rot-manager-box').classList.toggle('has-assign-banner', assignMode);
  if (assignMode) {
    let label;
    if (kind === 'item') {
      const item = ITEM_DEFS[shopState.items[p.idx].key];
      label = `l'oggetto <span style="color:${item.color}">${item.name}</span>`;
    } else if (kind === 'drug') {
      const drug = DRUG_DEFS[shopState.drugs[0].key];
      label = `la drug <span style="color:${drug.color}">${drug.name}</span>`;
    } else {
      const def = shopMoveDef(shopState.moves[p.idx]);
      label = `la mossa <span style="color:#fde68a">${def.name}</span>`;
    }
    banner.innerHTML = `<span>Clicca un ROT per assegnargli ${label}</span><button class="shop-picker-btn shop-picker-cancel" onclick="cancelPurchase()">ANNULLA</button>`;
    banner.classList.add('visible');
  } else {
    banner.innerHTML = '';
    banner.classList.remove('visible');

}

function rotCardLoadoutHtml(r, draggable) {

        const drug = DRUG_DEFS[drugKey];
        if (!drug) return '';
        return `<span class="loadout-token loadout-token-drug" onclick="showDrugInfoCentered(event,'${drugKey}')"><span class="drug-icon" style="background:${drug.color}"></span><span class="loadout-token-mult">x${count}</span></span>`;
      }).join('')
    : '<span class="loadout-token loadout-token-drug loadout-token-empty"><span class="drug-icon-empty"></span></span>';
  return `
    <div class="rm-loadout">
      <div class="rm-loadout-row"><span class="rm-loadout-label">OGGETTI</span><div class="loadout-tokens">${itemSlots}</div></div>
      <div class="rm-loadout-row"><span class="rm-loadout-label">DRUGS</span><div class="loadout-tokens">${drugsHtml}</div></div>
    </div>`;
}
// ── finestra assegnazione DRUG acquistata: token drug grandi, niente mosse/oggetti ──
function rotCardDrugSlotsHtml(r) {
  const drugCounts = {};
  (r.drugs || []).forEach(d => { drugCounts[d] = (drugCounts[d] || 0) + 1; });
  const ownedHtml = Object.entries(drugCounts).map(([drugKey, count]) => {
    const drug = DRUG_DEFS[drugKey];
    if (!drug) return '';
    return `<span class="loadout-token loadout-token-drug" onclick="showDrugInfoCentered(event,'${drugKey}')"><span class="drug-icon" style="background:${drug.color}"></span><span class="loadout-token-mult">x${count}</span></span>`;
  }).join('');
  const emptyHtml = '<span class="loadout-token loadout-token-drug loadout-token-empty"><span class="drug-icon-empty"></span></span>';
  return `<div class="rm-drug-slots">${emptyHtml}${ownedHtml}</div>`;
}
// ── finestra assegnazione OGGETTO acquistato: 2 slot oggetti grandi, niente mosse/drugs ──
function rotCardItemSlotsHtml(r) {
  const slots = [0, 1].map(i => {
    const key = r.items[i];
    if (key && ITEM_DEFS[key]) {
      return `<span class="loadout-token loadout-token-item" style="color:${ITEM_DEFS[key].color}" onclick="showItemInfoCentered(event,'${key}')">${ITEM_DEFS[key].name}</span>`;
    }
    return '<span class="loadout-token loadout-token-item loadout-token-empty">—</span>';
  }).join('');
  return `<div class="rm-item-slots">${slots}</div>`;
}

// ── dispatcher: sceglie la modalità (oggetti / drugs / mosse) in base all'acquisto in attesa ──
function renderRotManager() {
  const box = document.getElementById('rot-manager-box');
  const p = shopState.pendingPurchase;
  box.classList.remove('mode-items', 'mode-drugs', 'mode-moves', 'mode-replace');
  if (pendingRotReplace) {
    box.classList.add('mode-replace');
    renderRotManagerReplace();
  } else if (p && p.type === 'drug') {
    box.classList.add('mode-drugs');
    renderRotManagerDrugs(p);
  } else if (p && p.type === 'move') {
    box.classList.add('mode-moves');
    renderRotManagerMoves(p);
  } else {
    box.classList.add('mode-items');
    renderRotManagerItems(p);
  }
}

// ── assegna l'oggetto in attesa al ROT cliccato (Finestra 1) ──
let pendingItemSwap = null;
function assignPurchaseToRot(uid) {
  const p = shopState.pendingPurchase;
  if (!p || p.type !== 'item') return;
  const rot = runState.roster.find(r => r.uid === uid);
  if (!rot) return;

  const offer = shopState.items[p.idx];
  const emptySlot = rot.items.findIndex(it => it === null);
  if (emptySlot === -1) {
    pendingItemSwap = { uid, idx: p.idx, offer };
    renderItemSwapConfirm();
    return;
  }
  runState.gold -= offer.price;
  rot.items[emptySlot] = offer.key;
  shopState.bought.items[p.idx] = true;
  shopState.pendingPurchase = null;
  updateHud();
  closeRotManager();
  renderShop();
}

// ── assegna la drug in attesa al ROT cliccato (Finestra 2) ──
function assignDrugToRot(uid) {
  const p = shopState.pendingPurchase;
  if (!p || p.type !== 'drug') return;
  const rot = runState.roster.find(r => r.uid === uid);
  if (!rot) return;
  const offer = shopState.drugs[0];
  runState.gold -= offer.price;
  giveDrug(rot, offer.key);
  shopState.bought.drugs[0] = true;
  shopState.pendingPurchase = null;
  updateHud();
  closeRotManager();
  renderShop();
}

// ── finestrella: il ROT ha già un oggetto, conferma lo scambio con il MARSUPIO ──
function renderItemSwapConfirm() {
  const { uid, offer } = pendingItemSwap;
  const rot = runState.roster.find(r => r.uid === uid);
  const oldItem = ITEM_DEFS[rot.items[0]];
  const newItem = ITEM_DEFS[offer.key];
  document.getElementById('rot-confirm-content').innerHTML = `
    <div class="rot-confirm-text">${rot.def.name} ha già 2 oggetti. Vuoi spostare <b style="color:${oldItem.color}">${oldItem.name}</b> nel MARSUPIO e sostituirlo con <b style="color:${newItem.color}">${newItem.name}</b>?</div>
    <div class="rot-confirm-buttons">
      <button class="shop-picker-btn" onclick="confirmItemSwap(0)">CERTO CARO</button>
      <button class="shop-picker-btn" onclick="confirmItemSwapToMarsupio()">NOPE NEL MARSUPIO</button>
      <button class="shop-picker-btn shop-picker-cancel" onclick="cancelItemSwap()">NO COL CAZZO</button>
    </div>
  `;
  document.getElementById('rot-confirm-overlay').classList.add('on');
}
function confirmItemSwap(slotIdx) {
  const { uid, idx, offer } = pendingItemSwap;
  const rot = runState.roster.find(r => r.uid === uid);
  const oldKey = rot.items[slotIdx];
  const emptySlot = runState.marsupio.findIndex(s => s === null);
  if (emptySlot !== -1) runState.marsupio[emptySlot] = oldKey;
  runState.gold -= offer.price;
  rot.items[slotIdx] = offer.key;
  shopState.bought.items[idx] = true;
  shopState.pendingPurchase = null;
  pendingItemSwap = null;
  document.getElementById('rot-confirm-overlay').classList.remove('on');
  updateHud();
  closeRotManager();
  renderShop();
}
// ── opzione: non sostituire nulla, metti il nuovo oggetto acquistato direttamente nel MARSUPIO ──
function confirmItemSwapToMarsupio() {
  const { idx, offer } = pendingItemSwap;
  const emptySlot = runState.marsupio.findIndex(s => s === null);
  if (emptySlot !== -1) runState.marsupio[emptySlot] = offer.key;
  runState.gold -= offer.price;
  shopState.bought.items[idx] = true;
  shopState.pendingPurchase = null;
  pendingItemSwap = null;
  document.getElementById('rot-confirm-overlay').classList.remove('on');
  updateHud();
  closeRotManager();
  renderShop();
}
function cancelItemSwap() {
  pendingItemSwap = null;
  document.getElementById('rot-confirm-overlay').classList.remove('on');
}

// ── Finestra 3: catena di conferme per assegnare/sostituire una mossa ──
function assignMoveToRot(uid) {
  const p = shopState.pendingPurchase;
  if (!p || p.type !== 'move') return;
  const rot = runState.roster.find(r => r.uid === uid);
  if (!rot) return;
  moveAssignState = { uid, def: shopMoveDef(shopState.moves[p.idx]), stage: 'confirm' };
  renderMoveAssignDialog();
}
function renderMoveAssignDialog() {
  const s = moveAssignState;
  const rot = runState.roster.find(r => r.uid === s.uid);
  const content = document.getElementById('rot-confirm-content');
  if (s.stage === 'confirm') {
    content.innerHTML = `
      <div class="rot-confirm-text">Vuoi assegnare <b style="color:#fde68a">${s.def.name}</b> a <b>${rot.def.name}</b>?</div>
      <div class="rot-confirm-buttons">
        <button class="shop-picker-btn" onclick="confirmMoveAssign()">SI</button>
        <button class="shop-picker-btn shop-picker-cancel" onclick="cancelMoveAssign()">NO</button>
      </div>
    `;
  } else if (s.stage === 'replace-confirm') {
    content.innerHTML = `
      <div class="rot-confirm-text">${rot.def.name} ha già 4 mosse. Vuoi sostituire una mossa con <b style="color:#fde68a">${s.def.name}</b>?</div>
      <div class="rot-confirm-buttons">
        <button class="shop-picker-btn" onclick="startMoveSlotSelection()">SI VAI</button>
        <button class="shop-picker-btn shop-picker-cancel" onclick="cancelMoveAssign()">NO ASPE</button>
      </div>
    `;
  } else if (s.stage === 'final-confirm') {
    content.innerHTML = `
      <div class="rot-confirm-text">SOSTITUIRE? SEI SICURO BRO?</div>
      <div class="rot-confirm-buttons">
        <button class="shop-picker-btn" onclick="completeMoveAssign()">SI</button>
        <button class="shop-picker-btn shop-picker-cancel" onclick="backToMoveSlotSelection()">NO</button>
      </div>
    `;
  }
  document.getElementById('rot-confirm-overlay').classList.add('on');
}
function confirmMoveAssign() {
  const s = moveAssignState;
  const rot = runState.roster.find(r => r.uid === s.uid);
  if (rot.moves.length < 4) {
    const p = shopState.pendingPurchase;
    const offer = shopState.moves[p.idx];
    runState.gold -= offer.price;
    rot.moves.push({ ...s.def, curPp: s.def.pp });
    shopState.bought.moves[p.idx] = true;
    shopState.pendingPurchase = null;
    moveAssignState = null;
    document.getElementById('rot-confirm-overlay').classList.remove('on');
    updateHud();
    closeRotManager();
    renderShop();
  } else {
    s.stage = 'replace-confirm';
    renderMoveAssignDialog();
  }
}
function startMoveSlotSelection() {
  moveAssignState.stage = 'select-slot';
  document.getElementById('rot-confirm-overlay').classList.remove('on');
  renderRotManager();
}
function selectMoveSlotForReplace(event, slotIdx) {
  event.stopPropagation();
  moveAssignState.slotIdx = slotIdx;
  moveAssignState.stage = 'final-confirm';
  renderMoveAssignDialog();
}
function backToMoveSlotSelection() {
  moveAssignState.stage = 'select-slot';
  document.getElementById('rot-confirm-overlay').classList.remove('on');
  renderRotManager();
}
function completeMoveAssign() {
  const s = moveAssignState;
  const rot = runState.roster.find(r => r.uid === s.uid);
  const p = shopState.pendingPurchase;
  const offer = shopState.moves[p.idx];
  runState.gold -= offer.price;
  rot.moves[s.slotIdx] = { ...s.def, curPp: s.def.pp };
  shopState.bought.moves[p.idx] = true;
  shopState.pendingPurchase = null;
  moveAssignState = null;
  document.getElementById('rot-confirm-overlay').classList.remove('on');
  updateHud();
  closeRotManager();
  renderShop();
}
function cancelMoveAssign() {
  moveAssignState = null;
  document.getElementById('rot-confirm-overlay').classList.remove('on');
  renderRotManager();
}

// ── Click sinistro fuori da una finestra modale del negozio: chiude e annulla l'azione in corso ──
function onRotConfirmOutsideClick() {
  if (pendingItemSwap)                  { cancelItemSwap(); return; }
  if (moveAssignState)                  { cancelMoveAssign(); return; }
  if (pendingRotReplaceTarget !== null) { cancelRotReplaceTarget(); return; }
  cancelRotReplaceConfirm();
}
document.addEventListener('mousedown', e => {
  if (e.button !== 0) return; // solo click sinistro
  const moveInfo = document.getElementById('shop-move-info-overlay');
  if (moveInfo.classList.contains('on')) {
    if (!document.getElementById('shop-move-info-box').contains(e.target)) closeShopMoveInfo();
    return;
  }
  const confirm = document.getElementById('rot-confirm-overlay');
  if (confirm.classList.contains('on')) {
    if (!document.getElementById('rot-confirm-box').contains(e.target)) onRotConfirmOutsideClick();
    return;
  }
  const rm = document.getElementById('rot-manager-overlay');
  if (rm.classList.contains('on')) {
    if (!document.getElementById('rot-manager-box').contains(e.target)) cancelPurchase();
    return;
  }
});

// ── drag start: ROT (vendita) o oggetto (vendita / marsupio / riequip) ──
function onRotDragStart(event, uid) {
  rotManagerDrag = { kind: 'rot', uid };
  document.getElementById('rot-manager-overlay').classList.add('dragging');
  document.getElementById('rot-manager-sell-price').textContent = `+${ROT_PRICE}g`;
  event.target.classList.add('dragging');
  event.dataTransfer.effectAllowed = 'move';
}
function onItemDragStart(event, source, uid, slotIdx, key) {
  event.stopPropagation();
  rotManagerDrag = { kind: 'item', source, uid, slotIdx, key };
  document.getElementById('rot-manager-overlay').classList.add('dragging');
  const rarity = ITEM_DEFS[key] ? ITEM_DEFS[key].rarity : 'comune';
  document.getElementById('rot-manager-sell-price').textContent = `+${ITEM_PRICE[rarity] || 1}g`;
  document.getElementById('marsupio-overlay').classList.add('show');
  event.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(event) {
  document.getElementById('rot-manager-overlay').classList.remove('dragging');
  document.getElementById('rot-manager-sellzone').classList.remove('dragover');
  document.getElementById('marsupio-overlay').classList.remove('show');
  document.querySelectorAll('#rot-manager-overlay .dragover').forEach(el => el.classList.remove('dragover'));
  event.target.classList.remove('dragging');
  rotManagerDrag = null;
}

// ── zona VENDI in basso: vende il ROT o l'oggetto trascinato ──
function onSellZoneDragOver(event) {
  if (!rotManagerDrag) return;
  event.preventDefault();
  event.currentTarget.classList.add('dragover');
}
function onSellZoneDragLeave(event) {
  event.currentTarget.classList.remove('dragover');
}
function onSellDrop(event) {
  event.preventDefault();
  event.currentTarget.classList.remove('dragover');
  if (!rotManagerDrag) return;
  if (rotManagerDrag.kind === 'rot') {
    sellRot(rotManagerDrag.uid);
  } else if (rotManagerDrag.kind === 'item') {
    const rarity = ITEM_DEFS[rotManagerDrag.key] ? ITEM_DEFS[rotManagerDrag.key].rarity : 'comune';
    runState.gold += ITEM_PRICE[rarity] || 1;
    removeItemFromSource(rotManagerDrag);
    updateHud();
  }
  rotManagerDrag = null;
  renderRotManager();
}

// ── helper: sposta un oggetto via/verso la sua sorgente (ROT o slot marsupio) ──
function removeItemFromSource(d) {
  if (d.source === 'rot') {
    const r = runState.roster.find(x => x.uid === d.uid);
    if (r) r.items[d.slotIdx] = null;
  } else if (d.source === 'marsupio') {
    runState.marsupio[d.slotIdx] = null;
  }
}
function placeItemAtSource(d, key) {
  if (d.source === 'rot') {
    const r = runState.roster.find(x => x.uid === d.uid);
    if (r) r.items[d.slotIdx] = key;
  } else if (d.source === 'marsupio') {
    runState.marsupio[d.slotIdx] = key;
  }
}

// ── drop su un box ROT: riequipaggia l'oggetto trascinato (scambio con quello attuale) ──
function onRotCardDragOver(event) {
  if (!rotManagerDrag || rotManagerDrag.kind !== 'item') return;
  event.preventDefault();
  event.currentTarget.classList.add('dragover');
}
function onRotCardDragLeave(event) {
  event.currentTarget.classList.remove('dragover');
}
function onRotDrop(event, uid) {
  if (!rotManagerDrag || rotManagerDrag.kind !== 'item') return;
  event.preventDefault();
  event.currentTarget.classList.remove('dragover');
  const rot = runState.roster.find(r => r.uid === uid);
  if (!rot) { rotManagerDrag = null; return; }
  if (rotManagerDrag.source === 'rot' && rotManagerDrag.uid === uid) { rotManagerDrag = null; return; }
  let targetSlot = rot.items.findIndex(it => it === null);
  if (targetSlot === -1) targetSlot = 0;
  const oldItem = rot.items[targetSlot];
  const key = rotManagerDrag.key;
  removeItemFromSource(rotManagerDrag);
  rot.items[targetSlot] = key;
  if (oldItem) placeItemAtSource(rotManagerDrag, oldItem);
  rotManagerDrag = null;
  renderRotManager();
}

// ── drag su tutto il MARSUPIO: la scritta "SPOSTA" è già visibile da inizio drag (onItemDragStart) ──
function onMarsupioDragOver(event) {
  if (!rotManagerDrag || rotManagerDrag.kind !== 'item') return;
  event.preventDefault();
}
function onMarsupioDragLeave(event) {}
function onMarsupioDrop(event) {
  if (!rotManagerDrag || rotManagerDrag.kind !== 'item') return;
  event.preventDefault();
  document.getElementById('marsupio-overlay').classList.remove('show');
  const emptySlot = runState.marsupio.findIndex(s => s === null);
  if (emptySlot === -1) { rotManagerDrag = null; return; }
  if (rotManagerDrag.source === 'marsupio' && rotManagerDrag.slotIdx === emptySlot) { rotManagerDrag = null; return; }
  removeItemFromSource(rotManagerDrag);
  runState.marsupio[emptySlot] = rotManagerDrag.key;
  rotManagerDrag = null;
  renderRotManager();
}

    document.getElementById('shop-section-moves').innerHTML = `

// ── riduce automaticamente il font-size della descrizione delle mosse nel negozio
//    in modo che il testo non spinga mai in basso prezzo/tasto ACQUISTA ──
function fitShopMoveDescriptions() {
  document.querySelectorAll('#shop-section-moves .shop-move-card .shop-card-desc').forEach(el => {
    let fontSize = 15;
    el.style.fontSize = fontSize + 'px';
    while (el.scrollHeight > el.clientHeight + 1 && fontSize > 9) {
      fontSize -= 0.5;
      el.style.fontSize = fontSize + 'px';
    }
  });
}

function startNextBattle() {
  playBattleMusic();
  applyBattleBackground();
  turnNum = 1;
  const lvl = runState.level;
  runState.roster.forEach(r => {
    r.action = null;
    r.curHp = r.maxHp;
    r.isAlive = true;
    r.stages = { atk:0, spAtk:0, def:0, spDef:0, spd:0 };
    r.statuses = [];
    r.shield = 0;
    r.guardNext = null;
    r.guardTurn = null;
    r.immuneTurn = null;
    r.counterNext = null;
    r.critChanceOverride = null;
    r.landlordareTurns = 0;
    r.lastMove = null;
    r.moves.forEach(m => { if (m.curPp !== Infinity) m.curPp = m.pp; });
  });
  const enemyDefs = pickRandomDefs(runState.enemyCount);
  B = {
    player: runState.roster,
    enemy:  enemyDefs.map(def => mkRot(def, lvl, false)),
    phase: 'ROT_SELECT', current: null, selMove: null,
    assigned: {}, actedUids: new Set(),
  };
  B.tokenWidth = calibrateTokenWidth();
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('progress-overlay').classList.remove('on');
  clearLog();
  log(`Battaglia ${runState.battlesWon + 1} — Livello ${lvl} — ${B.enemy.length} nemici`, 'info');
  render();
}
